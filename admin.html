<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitch Dark Press Admin</title>
<style>
body { font-family: sans-serif; background:#0e0b14; color:#eee; margin:0; }
#toolbar { position:sticky; top:0; background:#1a1324; padding:10px; border-bottom:1px solid #333; }
#toolbar button { margin-right:6px; }
#editor { height:400px; overflow:auto; padding:10px; outline:none; }
</style>
</head>
<body>

<div id="toolbar">
<button onclick="format('bold')">B</button>
<button onclick="format('italic')">I</button>
<button onclick="format('underline')">U</button>
<button onclick="align('left')">L</button>
<button onclick="align('center')">C</button>
<button onclick="align('right')">R</button>
</div>

<div id="editor" contenteditable="true"></div>

<script>
let savedRange = null;

const editor = document.getElementById('editor');

editor.addEventListener('keyup', saveSelection);
editor.addEventListener('mouseup', saveSelection);

function saveSelection() {
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
        savedRange = sel.getRangeAt(0);
    }
}

function restoreSelection() {
    if (savedRange) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedRange);
    }
}

function format(cmd) {
    restoreSelection();
    document.execCommand(cmd, false, null);
    saveSelection();
}

function align(dir) {
    restoreSelection();
    document.execCommand('justify' + dir, false, null);
    saveSelection();
}
</script>

</body>
</html>
