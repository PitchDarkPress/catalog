<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitch Dark Press Admin</title>
  <style>
    :root {
      --bg: #0f0f12;
      --panel: #18181d;
      --panel-2: #202028;
      --line: #333340;
      --text: #f2f2f5;
      --muted: #b7b7c2;
      --accent: #d6b87a;
      --danger: #c96b6b;
      --ok: #7fc58d;
      --radius: 12px;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
    }

    input, select, button {
      font: inherit;
    }

    input[type="text"],
    input[type="number"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.small {
      padding: 8px 10px;
      min-width: 42px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grow {
      flex: 1 1 auto;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .statusbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 24px;
    }

    .status-good { color: var(--ok); }
    .status-bad { color: var(--danger); }

    .editor-shell {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel-2);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #191920;
    }

    .toolbar button.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    #editor {
      min-height: 420px;
      max-height: 70vh;
      overflow: auto;
      padding: 18px;
      outline: none;
      line-height: 1.6;
      background: #15151a;
    }

    #editor:empty::before {
      content: "Write here...";
      color: #7d7d89;
    }

    #editor p,
    #editor div {
      margin: 0 0 1em;
    }

    #editor p:last-child,
    #editor div:last-child {
      margin-bottom: 0;
    }

    .cover-preview {
      max-width: 180px;
      max-height: 260px;
      width: auto;
      height: auto;
      display: block;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111;
    }

    .hidden { display: none !important; }

    @media (max-width: 800px) {
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pitch Dark Press Admin</h1>

    <div class="card">
      <div class="grid two">
        <div class="field">
          <label for="tokenInput">GitHub Token</label>
          <input id="tokenInput" type="password" autocomplete="off" placeholder="Paste token" />
        </div>
        <div class="row" style="align-self:end;">
          <button id="saveTokenBtn" class="primary">Save Token</button>
          <button id="loadBooksBtn">Load Books</button>
        </div>
      </div>
      <div class="statusbar" id="topStatus"></div>
    </div>

    <div class="card">
      <div class="grid two">
        <div class="field grow">
          <label for="bookSelect">Book</label>
          <select id="bookSelect">
            <option value="">Choose a book</option>
          </select>
        </div>
        <div class="row" style="align-self:end;">
          <button id="openBookBtn" class="primary">Load Book</button>
          <button id="newBlankBtn">Clear Editor</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="grid two">
        <div class="field">
          <label for="titleInput">Title</label>
          <input id="titleInput" type="text" />
        </div>
        <div class="field">
          <label for="authorInput">Author</label>
          <input id="authorInput" type="text" />
        </div>
        <div class="field">
          <label for="statusInput">Status</label>
          <select id="statusInput">
            <option value="">Choose status</option>
          </select>
        </div>
        <div class="field">
          <label for="genreInput">Genre</label>
          <input id="genreInput" type="text" />
        </div>
        <div class="field">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" />
        </div>
        <div class="field">
          <label for="tagsInput">Tags</label>
          <input id="tagsInput" type="text" placeholder="tag1, tag2, tag3" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="grid two">
        <div>
          <div class="field">
            <label for="coverInput">Cover Image File Name</label>
            <input id="coverInput" type="text" placeholder="example.jpg" />
          </div>
          <div class="row" style="margin-top:12px;">
            <input id="coverUploadInput" type="file" accept="image/*" />
            <button id="uploadCoverBtn">Upload Cover</button>
          </div>
          <div class="muted" style="margin-top:8px;">Covers save to /covers/</div>
        </div>
        <div>
          <label>Cover Preview</label>
          <div style="margin-top:6px;">
            <img id="coverPreview" class="cover-preview hidden" alt="Cover preview" />
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <label style="display:block; margin-bottom:10px;">Main Text</label>
      <div class="editor-shell">
        <div class="toolbar">
          <button type="button" class="small" data-cmd="bold"><strong>B</strong></button>
          <button type="button" class="small" data-cmd="italic"><em>I</em></button>
          <button type="button" class="small" data-cmd="underline"><u>U</u></button>
          <button type="button" class="small" data-align="left">Left</button>
          <button type="button" class="small" data-align="center">Centre</button>
          <button type="button" class="small" data-align="right">Right</button>
        </div>
        <div id="editor" contenteditable="true" spellcheck="true"></div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="saveBookBtn" class="primary">Save</button>
      </div>
      <div class="statusbar" id="saveStatus"></div>
    </div>
  </div>

  <script>
    const tokenInput = document.getElementById('tokenInput');
    const saveTokenBtn = document.getElementById('saveTokenBtn');
    const loadBooksBtn = document.getElementById('loadBooksBtn');
    const bookSelect = document.getElementById('bookSelect');
    const openBookBtn = document.getElementById('openBookBtn');
    const newBlankBtn = document.getElementById('newBlankBtn');
    const titleInput = document.getElementById('titleInput');
    const authorInput = document.getElementById('authorInput');
    const statusInput = document.getElementById('statusInput');
    const genreInput = document.getElementById('genreInput');
    const yearInput = document.getElementById('yearInput');
    const tagsInput = document.getElementById('tagsInput');
    const coverInput = document.getElementById('coverInput');
    const coverUploadInput = document.getElementById('coverUploadInput');
    const uploadCoverBtn = document.getElementById('uploadCoverBtn');
    const coverPreview = document.getElementById('coverPreview');
    const editor = document.getElementById('editor');
    const saveBookBtn = document.getElementById('saveBookBtn');
    const topStatus = document.getElementById('topStatus');
    const saveStatus = document.getElementById('saveStatus');
    const toolbarButtons = Array.from(document.querySelectorAll('.toolbar button'));

    let booksData = [];
    let booksRoot = null;
    let selectedIndex = -1;
    let inferredRepo = null;
    let defaultBranch = 'main';

    tokenInput.value = localStorage.getItem('pdp_token') || '';

    function setStatus(target, text, good = true) {
      target.innerHTML = '<span class="' + (good ? 'status-good' : 'status-bad') + '">' + escapeHtml(text) + '</span>';
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getToken() {
      return (localStorage.getItem('pdp_token') || '').trim();
    }

    function saveToken() {
      const token = tokenInput.value.trim();
      localStorage.setItem('pdp_token', token);
      setStatus(topStatus, token ? 'Token saved.' : 'Token cleared.', !!token);
    }

    function inferRepoFromLocation() {
      const host = window.location.hostname;
      const parts = host.split('.');
      if (parts.length < 3 || parts[1] !== 'github' || parts[2] !== 'io') {
        return null;
      }
      const owner = parts[0];
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const repo = pathParts.length > 1 ? pathParts[0] : owner + '.github.io';
      return { owner, repo };
    }

    async function githubFetch(url, options = {}) {
      const token = getToken();
      if (!token) throw new Error('Missing GitHub token.');
      const headers = Object.assign({}, options.headers || {}, {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json'
      });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      if (!response.ok) {
        const text = await response.text();
        throw new Error('GitHub error: ' + response.status + ' ' + text);
      }
      return response;
    }

    async function ensureRepoInfo() {
      if (!inferredRepo) {
        inferredRepo = inferRepoFromLocation();
      }
      if (!inferredRepo) {
        throw new Error('Could not detect GitHub repo from this page URL.');
      }
      const url = 'https://api.github.com/repos/' + encodeURIComponent(inferredRepo.owner) + '/' + encodeURIComponent(inferredRepo.repo);
      const response = await githubFetch(url);
      const repoInfo = await response.json();
      defaultBranch = repoInfo.default_branch || 'main';
      return inferredRepo;
    }

    function getBooksArrayAndRoot(json) {
      if (Array.isArray(json)) {
        return { root: json, list: json };
      }
      if (json && Array.isArray(json.books)) {
        return { root: json, list: json.books };
      }
      throw new Error('books.json must be an array or an object with a books array.');
    }

    function normaliseTagsForInput(value) {
      if (Array.isArray(value)) return value.join(', ');
      if (typeof value === 'string') return value;
      return '';
    }

    function normaliseTagsForSave(value) {
      return value
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function getContentFieldName(book) {
      const candidates = ['content', 'description', 'body', 'text', 'html'];
      for (const key of candidates) {
        if (Object.prototype.hasOwnProperty.call(book, key)) return key;
      }
      return 'content';
    }

    function getCoverFieldName(book) {
      const candidates = ['cover', 'coverImage', 'image'];
      for (const key of candidates) {
        if (Object.prototype.hasOwnProperty.call(book, key)) return key;
      }
      return 'cover';
    }

    function isProbablyHtml(text) {
      return /<\/?[a-z][\s\S]*>/i.test(text);
    }

    function plainTextToHtml(text) {
      const safe = escapeHtml(String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n'));
      const paragraphs = safe.split(/\n\n+/);
      return paragraphs
        .map(block => '<p>' + block.replace(/\n/g, '<br>') + '</p>')
        .join('');
    }

    function sanitiseHtml(inputHtml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString('<div>' + (inputHtml || '') + '</div>', 'text/html');
      const sourceRoot = doc.body.firstElementChild;
      const outDoc = document.implementation.createHTMLDocument('clean');
      const outRoot = outDoc.createElement('div');

      function cleanInline(node, targetParent) {
        if (node.nodeType === Node.TEXT_NODE) {
          targetParent.appendChild(outDoc.createTextNode(node.nodeValue || ''));
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;

        const tag = node.tagName.toLowerCase();

        if (tag === 'br') {
          targetParent.appendChild(outDoc.createElement('br'));
          return;
        }

        if (tag === 'strong' || tag === 'b') {
          const el = outDoc.createElement('strong');
          Array.from(node.childNodes).forEach(child => cleanInline(child, el));
          targetParent.appendChild(el);
          return;
        }

        if (tag === 'em' || tag === 'i') {
          const el = outDoc.createElement('em');
          Array.from(node.childNodes).forEach(child => cleanInline(child, el));
          targetParent.appendChild(el);
          return;
        }

        if (tag === 'u') {
          const el = outDoc.createElement('u');
          Array.from(node.childNodes).forEach(child => cleanInline(child, el));
          targetParent.appendChild(el);
          return;
        }

        Array.from(node.childNodes).forEach(child => cleanInline(child, targetParent));
      }

      function buildBlock(tagName, node, align) {
        const el = outDoc.createElement(tagName);
        if (align) el.setAttribute('style', 'text-align:' + align);
        Array.from(node.childNodes).forEach(child => cleanInline(child, el));
        return el;
      }

      function appendTextBlock(text) {
        const value = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        if (!value.trim()) return;
        const blocks = value.split(/\n\n+/);
        blocks.forEach(block => {
          const p = outDoc.createElement('p');
          const parts = block.split('\n');
          parts.forEach((part, i) => {
            if (i > 0) p.appendChild(outDoc.createElement('br'));
            p.appendChild(outDoc.createTextNode(part));
          });
          outRoot.appendChild(p);
        });
      }

      function cleanTopLevel(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          appendTextBlock(node.nodeValue || '');
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;

        const tag = node.tagName.toLowerCase();
        const rawAlign = (node.style && node.style.textAlign ? node.style.textAlign : '').toLowerCase().trim();
        const align = ['left', 'center', 'right'].includes(rawAlign) ? rawAlign : '';

        if (tag === 'p') {
          outRoot.appendChild(buildBlock('p', node, ''));
          return;
        }

        if (tag === 'div') {
          outRoot.appendChild(buildBlock('div', node, align));
          return;
        }

        if (tag === 'br') {
          const p = outDoc.createElement('p');
          p.appendChild(outDoc.createElement('br'));
          outRoot.appendChild(p);
          return;
        }

        if (/^(h1|h2|h3|h4|h5|h6|blockquote|pre|article|section|header|footer|li|ul|ol)$/.test(tag)) {
          outRoot.appendChild(buildBlock('p', node, ''));
          return;
        }

        if (tag === 'strong' || tag === 'b' || tag === 'em' || tag === 'i' || tag === 'u') {
          const p = outDoc.createElement('p');
          cleanInline(node, p);
          outRoot.appendChild(p);
          return;
        }

        Array.from(node.childNodes).forEach(child => cleanTopLevel(child));
      }

      Array.from(sourceRoot.childNodes).forEach(child => cleanTopLevel(child));

      if (!outRoot.innerHTML.trim()) {
        return '';
      }

      const temp = outDoc.createElement('div');
      Array.from(outRoot.children).forEach(child => {
        if (!child.innerHTML.replace(/<br>/gi, '').trim()) return;
        temp.appendChild(child.cloneNode(true));
      });
      return temp.innerHTML;
    }

    function setEditorContent(value) {
      const raw = value == null ? '' : String(value);
      if (!raw.trim()) {
        editor.innerHTML = '';
        return;
      }
      const html = isProbablyHtml(raw) ? sanitiseHtml(raw) : sanitiseHtml(plainTextToHtml(raw));
      editor.innerHTML = html;
    }

    function getEditorContent() {
      return sanitiseHtml(editor.innerHTML);
    }

    function updateStatusOptions(books) {
      const current = statusInput.value;
      const set = new Set();
      books.forEach(book => {
        const value = book && book.status != null ? String(book.status).trim() : '';
        if (value) set.add(value);
      });
      statusInput.innerHTML = '<option value="">Choose status</option>';
      Array.from(set).sort((a, b) => a.localeCompare(b)).forEach(value => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        statusInput.appendChild(option);
      });
      if (current && !Array.from(statusInput.options).some(o => o.value === current)) {
        const option = document.createElement('option');
        option.value = current;
        option.textContent = current;
        statusInput.appendChild(option);
      }
      statusInput.value = current;
    }

    function populateBookSelect() {
      bookSelect.innerHTML = '<option value="">Choose a book</option>';
      booksData.forEach((book, index) => {
        const option = document.createElement('option');
        option.value = String(index);
        const bits = [];
        bits.push(book.title || 'Untitled');
        if (book.author) bits.push(book.author);
        option.textContent = bits.join(' — ');
        bookSelect.appendChild(option);
      });
      updateStatusOptions(booksData);
    }

    function showCoverPreview(filename) {
      const cleanName = String(filename || '').trim();
      if (!cleanName) {
        coverPreview.src = '';
        coverPreview.classList.add('hidden');
        return;
      }
      const base = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
      coverPreview.src = new URL('covers/' + encodeURIComponent(cleanName), base).toString();
      coverPreview.classList.remove('hidden');
    }

    function loadBookIntoForm(index) {
      const book = booksData[index];
      if (!book) {
        setStatus(saveStatus, 'Book not found.', false);
        return;
      }
      selectedIndex = index;
      titleInput.value = book.title || '';
      authorInput.value = book.author || '';
      const statusValue = book.status == null ? '' : String(book.status);
      if (statusValue && !Array.from(statusInput.options).some(o => o.value === statusValue)) {
        const option = document.createElement('option');
        option.value = statusValue;
        option.textContent = statusValue;
        statusInput.appendChild(option);
      }
      statusInput.value = statusValue;
      genreInput.value = book.genre || '';
      yearInput.value = book.year || '';
      tagsInput.value = normaliseTagsForInput(book.tags);
      const coverField = getCoverFieldName(book);
      coverInput.value = book[coverField] || '';
      showCoverPreview(coverInput.value);
      const contentField = getContentFieldName(book);
      setEditorContent(book[contentField] || '');
      setStatus(saveStatus, 'Book loaded.', true);
    }

    async function loadBooks() {
      try {
        setStatus(topStatus, 'Loading books...', true);
        const response = await fetch('books.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load books.json');
        const json = await response.json();
        const result = getBooksArrayAndRoot(json);
        booksRoot = result.root;
        booksData = result.list;
        populateBookSelect();
        setStatus(topStatus, 'Books loaded.', true);
      } catch (error) {
        setStatus(topStatus, error.message, false);
      }
    }

    function ensureSelection() {
      if (selectedIndex < 0 || !booksData[selectedIndex]) {
        throw new Error('Load a book first.');
      }
      return booksData[selectedIndex];
    }

    async function getFileSha(path) {
      const repo = await ensureRepoInfo();
      const url = 'https://api.github.com/repos/' + encodeURIComponent(repo.owner) + '/' + encodeURIComponent(repo.repo) + '/contents/' + path + '?ref=' + encodeURIComponent(defaultBranch);
      const response = await githubFetch(url);
      const data = await response.json();
      return data.sha;
    }

    async function putFile(path, contentString, message, sha = null) {
      const repo = await ensureRepoInfo();
      const url = 'https://api.github.com/repos/' + encodeURIComponent(repo.owner) + '/' + encodeURIComponent(repo.repo) + '/contents/' + path;
      const body = {
        message,
        content: btoa(unescape(encodeURIComponent(contentString))),
        branch: defaultBranch
      };
      if (sha) body.sha = sha;
      await githubFetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    async function saveBook() {
      try {
        const book = ensureSelection();
        setStatus(saveStatus, 'Saving...', true);
        const contentField = getContentFieldName(book);
        const coverField = getCoverFieldName(book);

        book.title = titleInput.value.trim();
        book.author = authorInput.value.trim();
        book.status = statusInput.value;
        book.genre = genreInput.value.trim();
        book.year = yearInput.value ? Number(yearInput.value) : '';
        book.tags = normaliseTagsForSave(tagsInput.value);
        book[coverField] = coverInput.value.trim();
        book[contentField] = getEditorContent();

        const sha = await getFileSha('books.json');
        const jsonText = JSON.stringify(booksRoot, null, 2) + '\n';
        await putFile('books.json', jsonText, 'Update books.json from admin', sha);

        populateBookSelect();
        bookSelect.value = String(selectedIndex);
        setStatus(saveStatus, 'Saved to books.json.', true);
      } catch (error) {
        setStatus(saveStatus, error.message, false);
      }
    }

    async function uploadCover() {
      try {
        const file = coverUploadInput.files[0];
        if (!file) throw new Error('Choose a cover file first.');
        if (!getToken()) throw new Error('Save your GitHub token first.');
        setStatus(saveStatus, 'Uploading cover...', true);
        const arrayBuffer = await file.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);
        let binary = '';
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        const base64 = btoa(binary);

        const repo = await ensureRepoInfo();
        const path = 'covers/' + file.name;
        let sha = null;
        try {
          sha = await getFileSha(path);
        } catch (_) {}

        const url = 'https://api.github.com/repos/' + encodeURIComponent(repo.owner) + '/' + encodeURIComponent(repo.repo) + '/contents/' + path;
        const body = {
          message: 'Upload cover ' + file.name,
          content: base64,
          branch: defaultBranch
        };
        if (sha) body.sha = sha;

        await githubFetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        coverInput.value = file.name;
        showCoverPreview(file.name);
        setStatus(saveStatus, 'Cover uploaded.', true);
      } catch (error) {
        setStatus(saveStatus, error.message, false);
      }
    }

    function insertHtmlAtCursor(html) {
      editor.focus();
      document.execCommand('insertHTML', false, html);
    }

    function textToPasteHtml(text) {
      const safe = escapeHtml(String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n'));
      const paragraphs = safe.split(/\n\n+/).map(block => '<p>' + block.replace(/\n/g, '<br>') + '</p>');
      return paragraphs.join('');
    }

    function applyAlignment(alignment) {
      editor.focus();
      if (alignment === 'left') document.execCommand('justifyLeft', false, null);
      if (alignment === 'center') document.execCommand('justifyCenter', false, null);
      if (alignment === 'right') document.execCommand('justifyRight', false, null);
      editor.innerHTML = sanitiseHtml(editor.innerHTML);
      refreshToolbarState();
    }

    function refreshToolbarState() {
      toolbarButtons.forEach(btn => btn.classList.remove('active'));
      try {
        document.queryCommandState('bold') && document.queryCommandEnabled('bold') && document.querySelector('[data-cmd="bold"]').classList.add('active');
        document.queryCommandState('italic') && document.queryCommandEnabled('italic') && document.querySelector('[data-cmd="italic"]').classList.add('active');
        document.queryCommandState('underline') && document.queryCommandEnabled('underline') && document.querySelector('[data-cmd="underline"]').classList.add('active');
      } catch (_) {}
    }

    saveTokenBtn.addEventListener('click', saveToken);
    loadBooksBtn.addEventListener('click', loadBooks);

    openBookBtn.addEventListener('click', () => {
      const index = Number(bookSelect.value);
      if (Number.isNaN(index)) {
        setStatus(saveStatus, 'Choose a book first.', false);
        return;
      }
      loadBookIntoForm(index);
    });

    newBlankBtn.addEventListener('click', () => {
      editor.innerHTML = '';
      editor.focus();
      setStatus(saveStatus, 'Editor cleared.', true);
    });

    coverInput.addEventListener('input', () => {
      showCoverPreview(coverInput.value);
    });

    uploadCoverBtn.addEventListener('click', uploadCover);
    saveBookBtn.addEventListener('click', saveBook);

    toolbarButtons.forEach(button => {
      button.addEventListener('click', () => {
        const cmd = button.getAttribute('data-cmd');
        const align = button.getAttribute('data-align');
        if (cmd) {
          editor.focus();
          document.execCommand(cmd, false, null);
          editor.innerHTML = sanitiseHtml(editor.innerHTML);
          refreshToolbarState();
          return;
        }
        if (align) {
          applyAlignment(align);
        }
      });
    });

    editor.addEventListener('paste', event => {
      event.preventDefault();
      const text = (event.clipboardData || window.clipboardData).getData('text/plain');
      insertHtmlAtCursor(textToPasteHtml(text));
      editor.innerHTML = sanitiseHtml(editor.innerHTML);
    });

    editor.addEventListener('blur', () => {
      editor.innerHTML = sanitiseHtml(editor.innerHTML);
    });

    editor.addEventListener('keyup', refreshToolbarState);
    editor.addEventListener('mouseup', refreshToolbarState);
    document.addEventListener('selectionchange', () => {
      if (document.activeElement === editor) refreshToolbarState();
    });

    loadBooks();
  </script>
</body>
</html>
