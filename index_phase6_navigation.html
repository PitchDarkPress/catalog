<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pitch Dark Press</title>
<style>
body {
    font-family: Georgia, serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    line-height: 1.6;
}

h1, h2, h3 {
    margin-top: 0;
}

#bookList {
    padding-left: 20px;
}

#bookList li {
    margin-bottom: 10px;
    cursor: pointer;
    padding: 4px 6px;
}

#bookList li:hover {
    text-decoration: underline;
}

#bookList li.selected {
    font-weight: bold;
    text-decoration: underline;
}

#bookTitle {
    margin-bottom: 8px;
}

#bookAuthor {
    display: block;
    margin-bottom: 20px;
}

#bookContent p {
    margin: 0 0 1.2em 0;
    line-height: 1.8;
}
</style>
</head>
<body>

<h1>Pitch Dark Press</h1>

<div>
    <h2>Books</h2>
    <ul id="bookList"></ul>
</div>

<hr>

<div>
    <h2 id="bookTitle"></h2>
    <strong id="bookAuthor"></strong>
    <div id="bookContent"></div>
</div>

<script>
let books = [];
let currentIndex = -1;

async function loadBooks() {
    try {
        const res = await fetch("books.json");
        books = await res.json();
        if (!Array.isArray(books)) books = [];
    } catch {
        books = [];
    }

    displayList();

    if (books.length > 0) {
        showBook(0);
    }
}

function displayList() {
    const list = document.getElementById("bookList");
    list.innerHTML = "";

    books.forEach((b, i) => {
        const li = document.createElement("li");
        li.textContent = b.title || "Untitled";
        li.onclick = () => showBook(i);

        if (i === currentIndex) {
            li.className = "selected";
        }

        list.appendChild(li);
    });
}

function showBook(index) {
    currentIndex = index;
    const b = books[index];

    document.getElementById("bookTitle").textContent = b.title || "";
    document.getElementById("bookAuthor").textContent = b.author || "";

    const contentBox = document.getElementById("bookContent");
    contentBox.innerHTML = "";

    const text = b.content || "";
    const paragraphs = text.split(/\n\s*\n/);

    paragraphs.forEach(paragraph => {
        const cleanText = paragraph.trim();
        if (cleanText !== "") {
            const p = document.createElement("p");
            p.textContent = cleanText;
            contentBox.appendChild(p);
        }
    });

    displayList();
}

loadBooks();
</script>

</body>
</html>
