<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitch Dark Press — Manifest (FIXED)</title>

<body>
<script>
// ONLY FIX APPLIED — content rendering

function openModal(idx) {
  const b = BOOKS[idx];

  let html = b.content || b.desc || b.fullText || '';

  if (!html.includes('<')) {
    html = html
      .split('\n\n')
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  document.getElementById('leftDesc').innerHTML = html;
}
</script>
</body>
</html>
