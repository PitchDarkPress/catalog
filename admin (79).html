<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Pitch Dark Press Manifest</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f0ece4;
    --olive: #607D1E;
    --olive-dim: #4a6118;
    --border: #2a2a2a;
    --input-bg: #111;
    --smoke: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 16px;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--smoke);
    margin-bottom: 2rem;
  }

  /* Token section */
  .token-section {
    max-width: 820px;
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 2rem;
  }

  .token-section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .token-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .token-row input {
    flex: 1;
  }

  .token-status {
    font-size: 0.7rem;
    margin-top: 0.6rem;
    letter-spacing: 0.05em;
  }

  .token-status.ok { color: #4a9; }
  .token-status.empty { color: #666; }

  /* Book blocks */
  .book-editor { max-width: 820px; }

  .book-block {
    border: 1px solid var(--border);
    margin-bottom: 0.6rem;
    overflow: hidden;
  }

  .book-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.25rem;
    cursor: pointer;
    background: #111;
    border-bottom: 1px solid transparent;
    transition: background 0.2s;
  }

  .book-header:hover { background: #181818; }
  .book-block.is-open .book-header { border-bottom-color: var(--border); }

  .book-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
  }

  .book-header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .book-header-status {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--smoke);
  }

  .chevron {
    font-size: 0.7rem;
    color: #555;
    transition: transform 0.2s;
  }

  .book-block.is-open .chevron { transform: rotate(180deg); }

  .book-fields {
    padding: 1.5rem 1.25rem;
    display: none;
    flex-direction: column;
    gap: 1rem;
  }

  .book-fields.open { display: flex; }

  /* Form elements */
  label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--smoke);
    display: block;
    margin-bottom: 0.3rem;
  }

  input[type="text"],
  input[type="url"],
  input[type="password"],
  select,
  textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.55rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--olive); }
  textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
  select option { background: #111; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--olive);
    cursor: pointer;
  }

  .checkbox-row label {
    font-size: 0.8rem;
    text-transform: none;
    letter-spacing: 0;
    color: #bbb;
    cursor: pointer;
    margin: 0;
  }

  /* Cover uploader */
  .cover-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .cover-preview {
    display: none;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.6rem;
  }

  .cover-preview img {
    width: 48px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border: 1px solid #333;
  }

  .cover-preview-name {
    font-size: 0.75rem;
    color: #aaa;
  }

  .upload-msg {
    font-size: 0.75rem;
    margin-top: 0.5rem;
    min-height: 1.1em;
    letter-spacing: 0.03em;
  }

  .upload-msg.ok { color: #4a9; }
  .upload-msg.err { color: #c55; }
  .upload-msg.working { color: #888; }

  .hint {
    font-size: 0.6rem;
    color: #555;
    margin-top: 0.3rem;
    letter-spacing: 0.03em;
    line-height: 1.5;
  }

  /* Buttons */
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
  }

  .btn-ghost {
    background: none;
    border-color: #555;
    color: #bbb;
  }

  .btn-ghost:hover { border-color: var(--olive); color: var(--olive); }

  .btn-olive {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--white);
  }

  .btn-olive:hover { background: var(--olive-dim); border-color: var(--olive-dim); }

  .btn-olive:disabled {
    background: #333;
    border-color: #333;
    color: #666;
    cursor: not-allowed;
  }

  .btn-danger {
    background: none;
    border-color: #333;
    color: #666;
  }

  .btn-danger:hover { border-color: #c00; color: #c00; }

  .btn-upload-cover {
    display: none;
  }

  .btn-upload-cover.visible { display: inline-block; }

  /* Bottom actions */
  .bottom-actions {
    max-width: 820px;
    margin-top: 1rem;
  }

  .btn-add {
    display: block;
    width: 100%;
    padding: 0.85rem;
    background: none;
    border: 1px dashed #333;
    color: #666;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
  }

  .btn-add:hover { border-color: var(--olive); color: var(--olive); }

  .publish-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-publish {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.9rem 2.5rem;
    background: var(--olive);
    border: none;
    color: var(--white);
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-publish:hover { background: var(--olive-dim); }
  .btn-publish:disabled { background: #333; color: #666; cursor: not-allowed; }

  .publish-status {
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  .publish-status.ok { color: #4a9; }
  .publish-status.err { color: #c55; }
  .publish-status.working { color: #888; }
</style>
</head>
<body>

<h1>The Manifest</h1>
<p class="subtitle">Admin Panel — Pitch Dark Press</p>

<div class="token-section">
  <h2>GitHub Token</h2>
  <div class="token-row">
    <div style="flex:1">
      <label>Personal Access Token</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <button class="btn btn-olive" onclick="saveToken()">Save</button>
  </div>
  <div class="token-status empty" id="tokenStatus">No token saved.</div>
</div>

<div class="book-editor" id="bookEditor"></div>

<div class="bottom-actions">
  <button class="btn-add" onclick="addBook()">+ Add New Title</button>
  <div class="publish-btn">
    <button class="btn-publish" onclick="publishToGitHub()">Publish to GitHub</button>
    <span class="publish-status" id="publishStatus"></span>
  </div>
</div>

// ── Token ──
function saveToken() {
  const val = document.getElementById('ghToken').value.trim();
  if (!val) { alert('Please paste a token first.'); return; }
  localStorage.setItem('pdp_gh_token', val);
  showTokenStatus();
}

function getToken() {
  return localStorage.getItem('pdp_gh_token') || '';
}

function showTokenStatus() {
  const token = getToken();
  const el = document.getElementById('tokenStatus');
  if (!el) return;
  if (token) {
    el.textContent = '✓ Token saved.';
    el.className = 'token-status ok';
    document.getElementById('ghToken').value = token;
  } else {
    el.textContent = 'No token saved. Paste your GitHub token above.';
    el.className = 'token-status empty';
  }
}

// ── Helpers ──
function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'untitled';
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getSafeName(filename) {
  const lastDot = filename.lastIndexOf('.');
  const ext = lastDot !== -1 ? filename.slice(lastDot).toLowerCase() : '.png';
  const base = lastDot !== -1 ? filename.slice(0, lastDot) : filename;
  const safeBase = base.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return safeBase + ext;
}

// ── GitHub API ──
async function ghGet(path) {
  const res = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path, {
    headers: { 'Authorization': 'token ' + getToken(), 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.ok) return res.json();
  return null;
}

async function ghPut(path, content, message) {
  const existing = await ghGet(path);
  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch: GH_BRANCH };
  if (existing && existing.sha) body.sha = existing.sha;
  const res = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + getToken(), 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || res.statusText);
  }
  return res.json();
}

async function ghPutBinary(path, base64Content, message) {
  const existing = await ghGet(path);
  const body = { message, content: base64Content, branch: GH_BRANCH };
  if (existing && existing.sha) body.sha = existing.sha;
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${getToken()}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || res.statusText);
  }
  return res.json();
}

// ── Cover upload ──
function chooseImage(i) {
  document.getElementById(`file-input-${i}`).click();
}

function onFileChosen(i, input) {
  const file = input.files[0];
  if (!file) return;
  const safeName = getSafeName(file.name);
  const previewEl = document.getElementById(`preview-${i}`);
  const uploadBtn = document.getElementById(`upload-btn-${i}`);
  const msgEl = document.getElementById(`upload-msg-${i}`);
  const reader = new FileReader();
  reader.onload = e => {
    previewEl.style.display = 'flex';
    previewEl.innerHTML = `<img src="${e.target.result}" alt="preview"><span class="cover-preview-name">${safeName}</span>`;
    previewEl.dataset.base64 = e.target.result.split(',')[1];
    previewEl.dataset.safeName = safeName;
  };
  reader.readAsDataURL(file);
  uploadBtn.classList.add('visible');
  msgEl.textContent = '';
  msgEl.className = 'upload-msg';
}

async function uploadCover(i) {
  if (!getToken()) { alert('Please save your GitHub token first.'); return; }
  const previewEl = document.getElementById(`preview-${i}`);
  const msgEl = document.getElementById(`upload-msg-${i}`);
  const uploadBtn = document.getElementById(`upload-btn-${i}`);
  const safeName = previewEl.dataset.safeName;
  const fileInput = document.getElementById(`file-input-${i}`);
  const file = fileInput.files[0];
  if (!file || !safeName) return;

  msgEl.textContent = 'Uploading cover…';
  msgEl.className = 'upload-msg working';
  uploadBtn.disabled = true;

  try {
    // Read file as base64
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const path = 'covers/' + safeName;
    const url = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path;
    const token = getToken();

    // Check if file already exists (need SHA to overwrite)
    let sha = null;
    try {
      const check = await fetch(url, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (check.ok) sha = (await check.json()).sha;
    } catch(e) {}

    const body = { message: 'Upload cover: ' + safeName, content: base64, branch: GH_BRANCH };
    if (sha) body.sha = sha;

    const res = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      msgEl.textContent = '✓ Cover uploaded successfully.';
      msgEl.className = 'upload-msg ok';
      books[i].cover = safeName;
      document.getElementById(`cover-field-${i}`).value = safeName;
      uploadBtn.classList.remove('visible');
    } else {
      const err = await res.json().catch(() => ({}));
      msgEl.textContent = '✗ Failed: ' + (err.message || res.status + ' ' + res.statusText);
      msgEl.className = 'upload-msg err';
      uploadBtn.disabled = false;
    }
  } catch(e) {
    msgEl.textContent = '✗ Failed: ' + e.message;
    msgEl.className = 'upload-msg err';
    uploadBtn.disabled = false;
  }
}

// ── Publish to GitHub ──
async function publishToGitHub() {
  if (!getToken()) { alert('Please save your GitHub token first.'); return; }
  const btn = document.querySelector('.btn-publish');
  const statusEl = document.getElementById('publishStatus');
  btn.disabled = true;
  statusEl.textContent = 'Publishing…';
  statusEl.className = 'publish-status working';

  try {
    const booksJson = JSON.stringify(books, null, 2);
    statusEl.textContent = 'Uploading index.html…';
    await ghPut('index.html', buildIndexHtml(booksJson), 'Update Manifest: index.html');
    statusEl.textContent = 'Uploading book.html…';
    await ghPut('book.html', buildBookHtml(booksJson), 'Update Manifest: book.html');
    saveToLocal();
    statusEl.textContent = '✓ Published. Live in ~30 seconds.';
    statusEl.className = 'publish-status ok';
  } catch(e) {
    statusEl.textContent = `✗ Failed: ${e.message}`;
    statusEl.className = 'publish-status err';
  }
  btn.disabled = false;
}

        <div>
          <label>Full description (book page)</label>
          <textarea oninput="update(${i},'description',this.value)">${esc(book.description)}</textarea>
          <p class="hint">Separate paragraphs with a blank line.</p>
        </div>
        <div>
          <label>Free text (Free titles only)</label>
          <textarea oninput="update(${i},'freeText',this.value)">${esc(book.freeText)}</textarea>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="coll-${i}" ${book.collective?'checked':''} onchange="update(${i},'collective',this.checked)">
          <label for="coll-${i}">Pitch Dark Collective title</label>
        </div>
        <button class="btn btn-danger" onclick="removeBook(${i})">Remove this title</button>
      </div>
    </div>
  `).join('');
}

function toggleBlock(i) {
  document.getElementById(`block-${i}`).classList.toggle('open');
  document.getElementById(`block-wrap-${i}`).classList.toggle('is-open');
}

function update(i, field, value) {
  books[i][field] = value;
  if (field === 'title') {
    books[i].id = slugify(value);
    document.querySelector(`#block-wrap-${i} .book-header-title`).textContent = value || 'Untitled';
  }
  if (field === 'status') {
    document.getElementById(`status-label-${i}`).textContent = statusOptions.find(s=>s.value===value)?.label||'';
  }
  saveToLocal();
}

function updateTags(i, value) {
  books[i].tags = value.split(',').map(t => t.trim().toLowerCase().replace(/^#+/,'')).filter(Boolean);
}

function addBook() {
  books.push({ id:'new-title', title:'', blurb:'', status:'smoke', cover:'', collective:false, amazon:'', genre:'', description:'', freeText:'', tags:[] });
  renderEditor();
  const last = books.length - 1;
  document.getElementById(`block-${last}`).classList.add('open');
  document.getElementById(`block-wrap-${last}`).classList.add('is-open');
  document.getElementById(`block-wrap-${last}`).scrollIntoView({ behavior: 'smooth' });
}

function removeBook(i) {
  if (!confirm(`Remove "${books[i].title || 'this title'}"?`)) return;
  books.splice(i, 1);
  renderEditor();
}

    /let books = \[[\s\S]*?\];(\s*\/\/ ── statusOptions)/,
    'let books = ' + booksJson + ';\n$1'
  );
}

// ── Init ──
loadFromLocal();
showTokenStatus();
renderEditor();
</script>
