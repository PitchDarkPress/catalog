<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pitch Dark Press Admin</title>
</head>
<body>

<h2>Pitch Dark Press Admin</h2>

<div>
<label>GitHub Token:</label><br>
<input type="password" id="token" style="width:300px;">
<button onclick="saveToken()">Save Token</button>
</div>

<hr>

<div>
<label>Choose Book:</label><br>
<select id="bookSelect" style="width:300px;"></select><br><br>

<button onclick="loadBook()">Load Book</button>
<button onclick="newBook()">New Book</button>
<button onclick="deleteBook()">Delete Book</button>
</div>

<hr>

<div>
<label>Title:</label><br>
<input id="title" style="width:300px;"><br><br>

<label>Author:</label><br>
<input id="author" style="width:300px;"><br><br>

<label>Status:</label><br>
<input id="status" style="width:300px;"><br><br>

<label>Genre:</label><br>
<input id="genre" style="width:300px;"><br><br>

<label>Year:</label><br>
<input id="year" style="width:300px;"><br><br>

<label>Tags (comma separated):</label><br>
<input id="tags" style="width:300px;"><br><br>

<button onclick="saveBook()">Save</button>
</div>

<script>
let books = [];
let currentIndex = null;

function saveToken() {
    localStorage.setItem("pdp_token", document.getElementById("token").value);
    alert("Token saved");
}

function loadToken() {
    const token = localStorage.getItem("pdp_token");
    if (token) {
        document.getElementById("token").value = token;
    }
}

async function loadBooks() {
    try {
        const res = await fetch("books.json");
        books = await res.json();
        if (!Array.isArray(books)) books = [];
    } catch {
        books = [];
    }
    populateDropdown();
}

function populateDropdown() {
    const select = document.getElementById("bookSelect");
    select.innerHTML = "";
    books.forEach((b, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = b.title || "Untitled";
        select.appendChild(opt);
    });
}

function loadBook() {
    const select = document.getElementById("bookSelect");
    if (select.value === "") {
        alert("No book selected");
        return;
    }

    currentIndex = parseInt(select.value);
    const b = books[currentIndex];

    document.getElementById("title").value = b.title || "";
    document.getElementById("author").value = b.author || "";
    document.getElementById("status").value = b.status || "";
    document.getElementById("genre").value = b.genre || "";
    document.getElementById("year").value = b.year || "";
    document.getElementById("tags").value = (b.tags || []).join(", ");
}

function newBook() {
    const b = {
        title: "",
        author: "",
        status: "",
        genre: "",
        year: "",
        tags: [],
        content: ""
    };
    books.push(b);
    currentIndex = books.length - 1;
    populateDropdown();
    document.getElementById("bookSelect").value = currentIndex;
    loadBook();
}

function deleteBook() {
    const select = document.getElementById("bookSelect");
    if (select.value === "") {
        alert("No book selected");
        return;
    }

    books.splice(parseInt(select.value), 1);
    currentIndex = null;
    populateDropdown();
    clearForm();
}

function clearForm() {
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
    document.getElementById("status").value = "";
    document.getElementById("genre").value = "";
    document.getElementById("year").value = "";
    document.getElementById("tags").value = "";
}

async function saveBook() {
    const token = localStorage.getItem("pdp_token");
    if (!token) {
        alert("Missing GitHub token");
        return;
    }

    if (currentIndex === null) {
        alert("No book selected");
        return;
    }

    books[currentIndex] = {
        title: document.getElementById("title").value,
        author: document.getElementById("author").value,
        status: document.getElementById("status").value,
        genre: document.getElementById("genre").value,
        year: document.getElementById("year").value,
        tags: document.getElementById("tags").value.split(",").map(t => t.trim()).filter(t => t),
        content: ""
    };

    const owner = "PitchDarkPress";
    const repo = "catalog";
    const path = "books.json";

    const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
    const fileData = await getRes.json();

    const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(books, null, 2))));

    await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Update books.json",
            content: updatedContent,
            sha: fileData.sha
        })
    });

    alert("Saved successfully");
    loadBooks();
}

loadToken();
loadBooks();
</script>

</body>
</html>
