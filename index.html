<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pitch Dark Press</title>
</head>
<body>

<h2>Pitch Dark Press</h2>

<div>
<h3>Books</h3>
<ul id="bookList"></ul>
</div>

<hr>

<div>
<h3 id="bookTitle"></h3>
<p><strong id="bookAuthor"></strong></p>
<div id="bookContent"></div>
</div>

<script>
let books = [];

async function loadBooks() {
    try {
        const res = await fetch("books.json");
        books = await res.json();
        if (!Array.isArray(books)) books = [];
    } catch {
        books = [];
    }

    displayList();
}

function displayList() {
    const list = document.getElementById("bookList");
    list.innerHTML = "";

    books.forEach((b, i) => {
        const li = document.createElement("li");
        li.textContent = b.title || "Untitled";
        li.style.cursor = "pointer";
        li.onclick = () => showBook(i);
        list.appendChild(li);
    });
}

function showBook(index) {
    const b = books[index];

    document.getElementById("bookTitle").textContent = b.title || "";
    document.getElementById("bookAuthor").textContent = b.author || "";

    document.getElementById("bookContent").textContent = b.content || "";
}

loadBooks();
</script>

</body>
</html>
