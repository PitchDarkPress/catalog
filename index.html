<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manifest – Pitch Dark Press</title>
<style>
body {
    font-family: Georgia, serif;
    background: #0b0b0b;
    color: #eaeaea;
    margin: 0;
    padding: 40px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
}

.card {
    background: #111;
    padding: 12px;
    border: 1px solid #222;
    cursor: pointer;
}

.status-box { font-size: 12px; color: #9acd32; margin-bottom: 6px; }
.cover { background: #222; height: 200px; margin-bottom: 10px; }
.genre { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.title { font-weight: bold; margin-bottom: 6px; }
.desc { font-size: 13px; margin-bottom: 8px; }
.tags { font-size: 11px; color: #7fbf7f; }

#readerPanel {
    display: none;
    max-width: 700px;
    margin: 0 auto;
    background: #111;
    border: 1px solid #222;
    padding: 30px;
}

#closeReader {
    margin-bottom: 20px;
    background: #111;
    color: #eaeaea;
    border: 1px solid #444;
    padding: 6px 12px;
    cursor: pointer;
}

#readerContent p {
    margin: 0 0 1.4em 0;
    line-height: 1.9;
}
</style>
</head>
<body>

<h1 id="pageTitle">Manifest</h1>

<div class="grid" id="grid"></div>

<div id="readerPanel">
    <button id="closeReader" onclick="closeReader()">Close</button>
    <div id="readerMeta"></div>
    <h2 id="readerTitle"></h2>
    <div id="readerAuthor"></div>
    <div id="readerContent"></div>
</div>

<script>
let books = [];

async function loadBooks() {
    try {
        const res = await fetch("books.json");
        books = await res.json();
        if (!Array.isArray(books)) books = [];
    } catch {
        books = [];
    }

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    books.forEach(b => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openReader(b);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = b.title || "";

        card.appendChild(title);
        grid.appendChild(card);
    });
}

function openReader(book) {
    document.getElementById("grid").style.display = "none";
    document.getElementById("pageTitle").style.display = "none";

    document.getElementById("readerPanel").style.display = "block";
    document.getElementById("readerTitle").textContent = book.title || "";
    document.getElementById("readerAuthor").textContent = book.author || "";

    const contentBox = document.getElementById("readerContent");
    contentBox.innerHTML = "";

    const paragraphs = (book.content || "").split(/\n\s*\n/);
    paragraphs.forEach(p => {
        if (p.trim()) {
            const el = document.createElement("p");
            el.textContent = p.trim();
            contentBox.appendChild(el);
        }
    });

    window.scrollTo({ top: 0 });
}

function closeReader() {
    document.getElementById("readerPanel").style.display = "none";
    document.getElementById("grid").style.display = "grid";
    document.getElementById("pageTitle").style.display = "block";
}

loadBooks();
</script>

</body>
</html>
