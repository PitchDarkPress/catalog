<html lang="en">

<title>Pitch Dark Press — Catalog</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg2: #0d0d0d;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #ffffff;
    --text-dim: #888888;
    --olive: #607D1E;
    --font: 'Space Grotesk', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    padding: 0;
    margin: 0;
  }

  .controls {
    padding: 1.2rem 0 0.8rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .search-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-wrap svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.82rem;
    padding: 0.6rem 0.8rem 0.6rem 2.2rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--olive); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  .sort-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 0.8rem;
    outline: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .sort-select:focus { border-color: var(--olive); }

  .count-line {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1.2rem;
  }
  .count-line strong { color: var(--text); }

  .catalog {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .book-card {
    display: flex;
    flex-direction: column;
    cursor: pointer;
    animation: fadeUp 0.35s ease both;
    transition: opacity 0.2s;
  }
  .book-card:hover { opacity: 0.85; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cover-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg3);
    margin-bottom: 0.75rem;
  }
  .cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .book-card:hover .cover-wrap img { transform: scale(1.04); }

  .status-badge {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    font-family: var(--font);
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    pointer-events: none;
  }
  .badge-published    { background: var(--olive); color: #fff; }
  .badge-coming-soon  { background: #333; color: #aaa; }
  .badge-free         { background: #1a3a1a; color: #6fc06f; border: 1px solid #2a5a2a; }
  .badge-fighting-back{ background: #3a1a00; color: #e08030; border: 1px solid #5a3000; }
  .badge-genesis      { background: #1a1a3a; color: #8080e0; border: 1px solid #2a2a5a; }
  .badge-dark-thought { background: #2a1a2a; color: #b060b0; border: 1px solid #3a1a3a; }

  .genre-tag {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.2rem;
  }
  .collective-tag {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 0.3rem;
  }
  .book-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    color: var(--text);
  }
  .book-desc {
    font-size: 0.74rem;
    line-height: 1.5;
    color: var(--text-dim);
    font-weight: 300;
    flex: 1;
    margin-bottom: 0.6rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .book-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    margin-bottom: 0.6rem;
  }
  .book-tag {
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--olive);
    cursor: pointer;
  }
  .book-tag:hover { text-decoration: underline; }

  .action-btn {
    display: block;
    text-align: center;
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem;
    text-decoration: none;
    transition: all 0.2s;
    margin-top: auto;
    border: none;
    width: 100%;
    box-sizing: border-box;
  }
  .btn-published { background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; }
  .btn-published:hover { background: var(--olive); color: var(--text); border-color: var(--olive); }
  .btn-free { background: transparent; border: 1px solid #2a5a2a; color: #6fc06f; cursor: pointer; }
  .btn-free:hover { background: #1a3a1a; }
  .btn-coming-soon, .btn-fighting-back, .btn-genesis, .btn-dark-thought {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: default; opacity: 0.6;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    overflow-y: auto;
    padding: 2rem 1rem;
    cursor: pointer;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    max-width: 740px;
    width: 100%;
    position: relative;
    margin: auto;
    cursor: default;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 10;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-inner {
    display: flex;
    gap: 0;
  }

  /* Portrait cover — left side */
  .modal-cover {
    width: 220px;
    min-width: 220px;
    background: var(--bg3);
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .modal-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    min-height: 330px;
  }
  .modal-cover-placeholder {
    width: 100%;
    min-height: 330px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    padding: 1rem;
  }

  /* Details — right side */
  .modal-details {
    flex: 1;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    padding-right: 3rem;
  }
  .modal-status-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    align-self: flex-start;
  }
  .modal-genre {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .modal-collective {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--olive);
  }
  .modal-title {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
  }
  .modal-divider {
    height: 1px;
    background: var(--border);
  }
  .modal-desc {
    font-size: 0.85rem;
    line-height: 1.75;
    color: #ccc;
    font-weight: 300;
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .modal-tag {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--olive);
    cursor: pointer;
  }
  .modal-tag:hover { text-decoration: underline; }
  .modal-action {
    margin-top: auto;
    padding-top: 1rem;
  }
  .modal-btn {
    display: inline-block;
    font-family: var(--font);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.7rem 1.5rem;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
  }
  .modal-btn-published { background: var(--olive); color: #fff; }
  .modal-btn-published:hover { background: #4e6518; }
  .modal-btn-free { background: #1a3a1a; color: #6fc06f; border: 1px solid #2a5a2a; }
  .modal-btn-free:hover { background: #0f2a0f; }
  .modal-btn-inactive { background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: default; opacity: 0.5; }

  /* Free text in modal */
  .modal-free-text {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    line-height: 1.85;
    color: #bbb;
    font-weight: 300;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  .modal-attribution {
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Responsive modal */
  @media (max-width: 580px) {
    .modal-inner { flex-direction: column; }
    .modal-cover { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
    .modal-cover img { min-height: 200px; max-height: 260px; }
    .modal-details { padding: 1.2rem; padding-right: 2.5rem; }
  }

  .no-results { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; }

  footer { border-top: 1px solid var(--border); padding: 1rem 0; text-align: center; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  footer span { color: var(--olive); }
</style>
</head>

let activeTag = '', searchQuery = '', sortOrder = 'newest';

document.getElementById('searchInput').addEventListener('input', e => {
  const val = e.target.value.toLowerCase().trim();
  if (val.startsWith('#')) { activeTag = val.slice(1); searchQuery = ''; }
  else { searchQuery = val; activeTag = ''; }
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortOrder = e.target.value; render();
});

function getFiltered() {
  let list = [...BOOKS];
  if (activeTag)   list = list.filter(b => (b.tags||[]).includes(activeTag));
  if (searchQuery) list = list.filter(b => b.title.toLowerCase().includes(searchQuery) || (b.tags||[]).some(t => t.includes(searchQuery)));
  list.sort((a,b) => {
    if (sortOrder==='newest') return b.year-a.year;
    if (sortOrder==='oldest') return a.year-b.year;
    if (sortOrder==='az')     return a.title.localeCompare(b.title);
    if (sortOrder==='za')     return b.title.localeCompare(a.title);
    return 0;
  });
  return list;
}

function openModal(idx) {
  const b   = BOOKS[idx];
  const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];

  // Cover
  const coverEl = document.getElementById('modalCover');
  if (b.cover) {
    coverEl.innerHTML = `<img src="${b.cover}" alt="${b.title}" onerror="this.parentElement.innerHTML='<div class=modal-cover-placeholder>Cover<br>Coming Soon</div>'">`;
  } else {
    coverEl.innerHTML = `<div class="modal-cover-placeholder">Cover<br>Coming Soon</div>`;
  }

  // Details
  const collectiveHtml = b.author ? `<div class="modal-collective">${b.author}</div>` : '';
  let actionHtml;
  if (b.status === 'published' && b.link) {
    actionHtml = `<a class="modal-btn modal-btn-published" href="${b.link}" target="_blank" rel="noopener">${cfg.label}</a>`;
  } else if (b.status === 'free') {
    actionHtml = `<span class="modal-btn modal-btn-free" style="cursor:default;">${cfg.label}</span>`;
  } else {
    actionHtml = `<span class="modal-btn modal-btn-inactive">${cfg.label}</span>`;
  }

  const freeTextHtml = b.status === 'free' && b.fullText
    ? `<div class="modal-free-text">${b.fullText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
    : '';

  const tagsHtml = (b.tags||[]).map(t =>
    `<span class="modal-tag" onclick="filterByTag('${t}');closeModal()">#${t}</span>`
  ).join(' ');

  document.getElementById('modalDetails').innerHTML = `
    <span class="modal-status-badge ${cfg.badgeClass}">${cfg.badge}</span>
    <div class="modal-genre">${b.genre} · ${b.year}</div>
    ${collectiveHtml}
    <div class="modal-title">${b.title}</div>
    <div class="modal-divider"></div>
    <div class="modal-desc">${b.desc}</div>
    <div class="modal-tags">${tagsHtml}</div>
    <div class="modal-action">${actionHtml}</div>
    ${freeTextHtml}
  `;

  document.getElementById('modalAttribution').textContent =
    'Pitch Dark Press' + (b.author ? ' · ' + b.author : '');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

function filterByTag(tag) { activeTag = activeTag===tag ? '' : tag; render(); }

function render() {
  const catalog = document.getElementById('catalog');
  const books   = getFiltered();
  document.getElementById('countLine').innerHTML = `Showing <strong>${books.length}</strong> of <strong>${BOOKS.length}</strong> titles`;

  if (!books.length) { catalog.innerHTML = '<div class="no-results">No titles found</div>'; return; }

  catalog.innerHTML = books.map((b,i) => {
    const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];
    const idx = BOOKS.indexOf(b);
    const tagsHtml = (b.tags||[]).map(t => `<span class="book-tag" onclick="event.stopPropagation();filterByTag('${t}')">#${t}</span>`).join('');
    const collectiveHtml = b.author ? `<div class="collective-tag">${b.author}</div>` : '';

    return `<div class="book-card" style="animation-delay:${i*0.035}s" onclick="openModal(${idx})">
      <div class="cover-wrap">
        <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.style.opacity='0'">
        <span class="status-badge ${cfg.badgeClass}">${cfg.badge}</span>
      </div>
      <div class="genre-tag">${b.genre} · ${b.year}</div>
      ${collectiveHtml}
      <div class="book-title">${b.title}</div>
      <div class="book-desc">${b.desc}</div>
      <div class="book-tags">${tagsHtml}</div>
      <span class="action-btn ${cfg.btnClass}">${cfg.label}</span>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
