<!DOCTYPE html>
<html lang="en" style="background:#000">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<style>html,body{background:#000!important}</style>
<title>Pitch Dark Press — Manifest</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000;
  --bg2: #0d0d0d;
  --bg3: #171717;
  --border: #2a2a2a;
  --text: #fff;
  --text-dim: #888;
  --olive: #607D1E;
  --font: 'Space Grotesk', sans-serif;
  --phos: #39ff6a;
  --phos-dim: #1a7a35;
  --phos-bg: rgba(0,15,6,0.92);
  --phos-border: rgba(57,255,106,0.25);
  --phos-glow: 0 0 8px rgba(57,255,106,0.35), 0 0 20px rgba(57,255,106,0.12);
}
html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  height: 100%;
  background: #000;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100%;
  width: 100%;
  animation: pageLoad 0.4s ease forwards;
}
@keyframes pageLoad {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pageExit {
  from { opacity: 1; }
  to { opacity: 0; }
}
body.fade-out {
  animation: pageExit 0.3s ease forwards;
}

/* ── HEADER ─────────────────────────────────────────────── */
.site-header-graft {
  width: 979px;
  max-width: 100%;
  margin: 0 auto;
  padding: 0;
  text-align: center;
}
.site-header-logo {
  display: block;
  margin: 50px auto 0;
  position: relative;
  left: -1px;
  width: 318px;
  height: 235px;
  max-width: 90vw;
  object-fit: contain;
}
.site-header-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 25px;
  height: 23px;
}
.back-btn {
  color: var(--text);
  text-decoration: none;
  font-size: 18.5px;
  font-weight: 400;
  letter-spacing: .04em;
  transition: color .18s ease;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
}
.back-btn:hover { color: var(--olive); }

/* ── CONTROLS ────────────────────────────────────────────── */
.controls {
  max-width: 979px;
  margin: 80px auto .55rem auto;
  padding: 0 1.5rem .35rem;
}
.search-row { display:flex; align-items:center; gap:.8rem; }
.search-wrap { position:relative; flex:1; }
.search-wrap svg { position:absolute; left:.8rem; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; }
input[type="search"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: .82rem;
  padding: .7rem .8rem .7rem 2.2rem;
  outline: none;
  -webkit-appearance: none;
  border-radius: 0;
}
input[type="search"]:focus { border-color: var(--olive); }
input[type="search"]::placeholder { color: var(--text-dim); }
.sort-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: .72rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: .7rem .8rem;
  outline: none;
  cursor: pointer;
  white-space: nowrap;
  -webkit-appearance: none;
  border-radius: 0;
}
.count-line {
  max-width: 979px;
  margin: 0 auto .45rem auto;
  padding: 0 1.5rem;
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.count-line strong { color: var(--text); }

/* ── CATALOG GRID ────────────────────────────────────────── */
.catalog {
  display: grid;
  max-width: 979px;
  width: 100%;
  margin: 0 auto 2rem;
  padding: 0 1.5rem;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0;
}
.book-card {
  display:flex;
  flex-direction:column;
  min-width:0;
  cursor:pointer;
  animation: fadeUp .35s ease both;
  transition: opacity .2s ease;
  padding: 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
}
.book-card:hover { opacity:.86; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.cover-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg3);
  margin-bottom: .75rem;
}
.cover-wrap img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition: transform .4s ease;
}
.book-card:hover .cover-wrap img { transform: scale(1.04); }
.status-badge {
  position:absolute;
  top:.5rem;
  left:.5rem;
  font-size:.58rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:.2rem .5rem;
  pointer-events:none;
}
.badge-published{background:var(--olive);color:#fff;}
.badge-coming-soon{background:#333;color:#aaa;}
.badge-free{background:#1a3a1a;color:#6fc06f;border:1px solid #2a5a2a;}
.badge-fighting-back{background:#3a1a00;color:#e08030;border:1px solid #5a3000;}
.badge-genesis{background:#1a1a3a;color:#8080e0;border:1px solid #2a2a5a;}
.badge-dark-thought{background:#2a1a2a;color:#b060b0;border:1px solid #3a1a3a;}
.genre-tag { font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--text-dim); margin-bottom:.2rem; }
.collective-tag { font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--olive); margin-bottom:.3rem; }
.book-title { font-size:.88rem; font-weight:600; line-height:1.3; margin-bottom:.35rem; color:var(--text); }
.book-tags { display:flex; flex-wrap:wrap; gap:.25rem; margin-bottom:.6rem; }
.book-tag { font-size:.58rem; letter-spacing:.08em; color:var(--olive); cursor:pointer; }
.book-tag:hover { text-decoration:underline; }
.action-btn {
  display:block;
  text-align:center;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:.55rem;
  margin-top:auto;
  border:none;
  width:100%;
}
.btn-published{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
.btn-free{background:transparent;border:1px solid #2a5a2a;color:#6fc06f;}
.btn-coming-soon,.btn-fighting-back,.btn-genesis,.btn-dark-thought{background:transparent;border:1px solid var(--border);color:var(--text-dim);opacity:.6;}

/* ── THEATRE OVERLAY ─────────────────────────────────────── */
.theatre-overlay {
  display:none;
  position:fixed;
  inset:0;
  z-index:1000;
  background:rgba(0,0,0,0);
  overflow-y:auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
}
.theatre-overlay.open { display:block; animation:curtainFall .3s ease forwards; }
@keyframes curtainFall { from { background:rgba(0,0,0,0); } to { background:rgba(0,0,0,.78); } }
.theatre-stage {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.35rem .8rem 2rem;
  position:relative;
}
.theatre-close {
  position:fixed;
  top:.8rem;
  right:.8rem;
  background:var(--phos-bg);
  border:1px solid var(--phos-border);
  color:var(--phos);
  font-family:'Courier New', monospace;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:.42rem .9rem;
  cursor:pointer;
  z-index:1010;
}
.theatre-content {
  display:flex;
  align-items:stretch;
  justify-content:center;
  gap:1.35rem;
  width:100%;
  max-width:1220px;
}
.theatre-left,
.theatre-right,
.theatre-cover {
  min-width:0;
}
.theatre-left {
  width:min(360px, 100%);
  background:var(--phos-bg);
  border:1px solid var(--phos-border);
  box-shadow:var(--phos-glow);
  padding:1.9rem 1.4rem;
  position:relative;
}
.left-genre {
  font-size:.78rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--phos);
  margin-bottom:1rem;
  font-family:'Courier New', monospace;
}
.left-desc {
  font-size:.95rem;
  line-height:1.85;
  color:#e0e0e0;
  font-weight:300;
  max-height:320px;
  overflow-y:auto;
}
.left-desc p { margin:0; line-height:1.75; }
.left-desc p:empty { height:0.7em; display:block; }
.left-desc p + p:not(:empty) { margin-top:0; }
.left-desc strong { font-weight:700; }
.theatre-cover {
  width:300px;
  flex-shrink:0;
}
.theatre-cover img {
  width:100%;
  display:block;
  border:1px solid var(--phos-border);
  box-shadow:var(--phos-glow), 0 12px 50px rgba(0,0,0,.9);
}
.theatre-cover-placeholder {
  width:100%;
  aspect-ratio:2/3;
  background:#050f08;
  border:1px solid var(--phos-border);
  box-shadow:var(--phos-glow);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--phos);
  font-size:.85rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  text-align:center;
  font-family:'Courier New', monospace;
}
.theatre-cover-action { margin-top:.8rem; }
.theatre-cover-btn {
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:.6rem .7rem;
  text-decoration:none;
  border:none;
  width:100%;
}
.cover-status-label {
  display:block;
  font-size:.55rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:.25rem;
  opacity:.7;
  font-family:'Courier New', monospace;
}
.cover-btn-published{background:var(--phos);color:#000;box-shadow:var(--phos-glow);}
.cover-btn-free{background:rgba(57,255,106,.15);color:var(--phos);border:1px solid var(--phos-border);box-shadow:var(--phos-glow);}
.cover-btn-inactive{background:rgba(57,255,106,.1);border:1px solid var(--phos-border);color:var(--phos);box-shadow:var(--phos-glow);}

/* ── RIGHT PANEL — TITLE BOX FIXED ──────────────────────── */
.theatre-right {
  width:min(320px, 100%);
  display:flex;
  flex-direction:column;
  gap:1rem;
}
.right-title-box,
.right-author-box,
.right-tags-box {
  background:var(--phos-bg);
  border:1px solid var(--phos-border);
  box-shadow:var(--phos-glow);
  padding:1.05rem 1.2rem;
}
.right-title-label,
.right-author-label,
.right-tags-label {
  font-size:.74rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--phos);
  margin-bottom:.45rem;
  font-family:'Courier New', monospace;
}
.right-title-text {
  font-size: clamp(.88rem, 1.3vw, 1.05rem);
  line-height: 1.35;
  font-weight: 600;
  letter-spacing: .03em;
  color: #fff;
  word-break: break-word;
}
.right-collective,
.right-author-name {
  font-size:1rem;
  font-weight:600;
  color:#fff;
}
.right-collective { margin-bottom:.15rem; }
.right-tags { display:flex; flex-wrap:wrap; gap:.35rem; }
.right-tag { font-size:.9rem; letter-spacing:.06em; color:#bbb; cursor:pointer; }
.right-tag:hover { color:var(--phos); }
.expand-btn {
  position:absolute;
  top:.6rem;
  right:.6rem;
  font-size:1rem;
  color:var(--phos-dim);
  cursor:pointer;
  line-height:1;
  user-select:none;
}
.expand-btn.expanded { color:var(--phos); transform:rotate(45deg); }

/* ── EXPAND MODAL ────────────────────────────────────────── */
#expandModal {
  display:none;
  position:fixed;
  inset:0;
  z-index:1090;
  background:rgba(0,0,0,.7);
}
#expandModal.open { display:block; }
#expandModalInner {
  position:absolute;
  top:8vh;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw, 700px);
  height:84vh;
  background:rgba(0, 30, 12, .98);
  border:1px solid var(--phos-border);
  box-shadow:var(--phos-glow);
  overflow-y:auto;
  padding:2.4rem 2rem;
}
#expandModalClose {
  position:absolute;
  top:.6rem;
  right:.6rem;
  background:transparent;
  border:none;
  color:var(--phos-dim);
  font-size:1rem;
  cursor:pointer;
}
#expandModalContent {
  font-size:.95rem;
  line-height:1.9;
  color:#e0e0e0;
  font-weight:300;
}
#expandModalContent p { margin:0; line-height:1.9; }
#expandModalContent p:empty { height:0.7em; display:block; }
#expandModalContent strong { font-weight:700; }
#expandModalContent em { font-style:italic; }
#expandModalContent u { text-decoration:underline; }
.left-desc strong { font-weight:700; }
.left-desc em { font-style:italic; }
.left-desc u { text-decoration:underline; }

/* ── ATTRIBUTION ─────────────────────────────────────────── */
.theatre-attribution {
  position:absolute;
  bottom:.8rem;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  font-family:'Courier New', monospace;
  line-height:1.8;
}
.attr-line1, .attr-line2 {
  display:block;
  font-size:.72rem;
  color:var(--phos-dim);
  white-space:nowrap;
}
.attr-line1 { letter-spacing:.18em; }
.attr-line2 { letter-spacing:.38em; text-transform:uppercase; }

/* ── MISC ────────────────────────────────────────────────── */
.no-results { grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--text-dim); font-size:.8rem; letter-spacing:.15em; text-transform:uppercase; }
footer {
  max-width:1200px;
  margin:0 auto;
  padding:1rem 1.5rem;
  text-align:center;
  font-size:.6rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--text-dim);
}
footer span { color:var(--olive); }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 1024px) {
  .catalog { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (max-width: 768px) {
  .site-header-graft { padding: 0.8rem 1rem 0; }
  .site-header-logo { width: 220px; margin-bottom: 0.7rem; }
  .site-header-nav a { font-size:16px; }
  .controls, .count-line, .catalog, footer { padding-left:1rem; padding-right:1rem; }
  .catalog { grid-template-columns: repeat(2, minmax(0,1fr)); gap:1.35rem; }
  .theatre-content {
    flex-direction:column;
    align-items:center;
    gap:.95rem;
  }
  .theatre-left, .theatre-right, .theatre-cover {
    width:min(100%, 380px);
  }
  #expandModalInner {
    width:94vw;
    height:86vh;
    top:7vh;
    padding:2rem 1rem 1.35rem;
  }
}
@media (max-width: 480px) {
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  .catalog {
    grid-template-columns: 1fr 1fr;
    gap: .85rem;
    padding-left: .75rem;
    padding-right: .75rem;
  }
  .controls, .count-line, footer {
    padding-left: .75rem;
    padding-right: .75rem;
  }
  .site-header-graft {
    padding: 1.4rem .75rem 0;
  }
  .site-header-logo { width: clamp(180px, 70vw, 240px); margin-bottom: 1rem; }
  .site-header-nav { gap:.35rem .7rem; }
  .site-header-nav a { font-size:14px; letter-spacing:.1em; }
  .theatre-stage { padding:.65rem .35rem 1.35rem; }
  .theatre-left, .theatre-right, .theatre-cover {
    width: 100%;
    max-width: none;
  }
  .theatre-left,
  .right-title-box,
  .right-author-box,
  .right-tags-box {
    padding-left:1rem;
    padding-right:1rem;
  }
  .left-desc { max-height:none; }
  .theatre-overlay {
    width: 100vw;
    max-width: 100vw;
  }
}
@media (max-width: 360px) {
  .catalog {
    grid-template-columns: 1fr;
    gap: 1rem;
  }
}
</style>
</head>
<body>

<header class="site-header-graft">
  <img
    class="site-header-logo"
    src="https://static.wixstatic.com/media/0fbaaa_aaa1e3d018104300850b6c8e7df4e981~mv2.png/v1/fill/w_318,h_235,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/PDP%20LOGO%20-%20PNG.png"
    alt="Pitch Dark Press — Publish and Be Damned"
  >
  <nav class="site-header-nav" aria-label="Pitch Dark Press">
    <button class="back-btn" onclick="window.location.href='https://www.pitchdarkpress.com/'">← Back</button>
  </nav>
</header>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Search titles or #tags…" autocomplete="off">
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="newest">By Status</option>
      <option value="oldest">Oldest</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>
</div>

<div class="count-line" id="countLine"></div>
<div class="catalog" id="catalog"></div>
<footer>Pitch Dark Press <span>MANIFEST</span></footer>

<div class="theatre-overlay" id="theatreOverlay">
  <button class="theatre-close" id="theatreClose">✕ Close</button>
  <div class="theatre-stage" id="theatreStage">
    <div class="theatre-content" id="theatreContent">
      <div class="theatre-left" id="theatreLeft" onclick="if(!document.getElementById('expandModal').classList.contains('open')) toggleExpand('desc')">
        <div class="expand-btn" id="descExpandBtn" onclick="event.stopPropagation();toggleExpand('desc')" title="Expand">⤢</div>
        <div class="left-genre" id="leftGenre"></div>
        <div class="left-desc" id="leftDesc"></div>
      </div>

      <div class="theatre-cover" id="theatreCover">
        <div id="coverInner"></div>
        <div class="theatre-cover-action" id="coverAction" onclick="event.stopPropagation()"></div>
      </div>

      <div class="theatre-right" id="theatreRight">
        <div class="right-title-box">
          <div class="right-title-label">Title</div>
          <div class="right-title-text" id="rightTitleText"></div>
        </div>
        <div class="right-author-box" id="rightAuthor">
          <div class="right-author-label">Author</div>
          <div class="right-collective" id="rightCollective" style="display:none">The Pitch Dark Press Collective</div>
          <div class="right-author-name" id="rightAuthorName"></div>
        </div>
        <div class="right-tags-box">
          <div class="right-tags-label">Tags</div>
          <div class="right-tags" id="rightTags"></div>
        </div>
      </div>
    </div>

    <div class="theatre-attribution" id="theatreAttribution"></div>
  </div>
</div>

<div id="expandModal" onclick="collapseAll()">
  <div id="expandModalInner" onclick="event.stopPropagation()">
    <button id="expandModalClose" onclick="collapseAll()">✕</button>
    <div id="expandModalContent"></div>
  </div>
</div>

  {

    content: "<h2>I Saved a Fly the Other Day</h2><p><b><br></b></p><p>I saved a fly the other day.</p><p>It was lying on its back</p><p>In a shallow pool of water</p><p>On a crumpled plastic sack.</p><p><b><br></b></p><p>It didn’t move or cry for help,</p><p>Just lay there, slick and still.</p><p>I sat smoking fags and drinking tea</p><p>With time enough to kill.</p><p><b><br></b></p><p>Then I saw a leg move.</p><p>Then I saw another.</p><p>It wasn’t dead at all —</p><p>Just stuck there in the water.</p><p><b><br></b></p><p>With a folded scrap of paper</p><p>I set it on its feet.</p><p>It trembled for a moment</p><p>Then lifted in the heat.</p><p><b><br></b></p><p>It didn’t say a thank you,</p><p>Or wave a cheery wing.</p><p>It simply flew off out of sight</p><p>As if I hadn’t done a thing.</p><p><b><br></b></p><p>Now I eat meat and drive a car,</p><p>I warm the air each day.</p><p>But I am human — so I tell myself</p><p>It doesn’t count that way.</p><p><b><br></b></p><p>That fly is buzzing somewhere now,</p><p>A nuisance, most would say.</p><p>But it won’t bring the oceans up</p><p>To wash our towns away.</p><p><b><br></b></p><p>So next time you see a fly</p><p>And it’s driving you quite mad,</p><p>Just take a second, have a look,</p><p>And don’t swat it quite so fast.</p><p><b><br></b></p><p>Cos when we’re gone</p><p>And it’s all made good,</p><p>We won’t be coming back —</p><p>Just tiny flies like him.</p><p><b></b><br></p>",

    author: "Kevin Martin - 18.36",
    content: "<p>A phone box. Night.</p><p>The rain has stopped.<br>Light stains the pavement with dull, bright colours.<br>Traffic hisses past without slowing.</p><p>A man.</p><p>A woman.</p><p>They stand close, but not quite touching.<br>They are waiting.</p><p>Across the street, an upstairs window glows with too much light. A woman moves behind the glass — bare but for stocking, the tops dark against her legs. She dances slowly for someone inside the room, perhaps only for herself.</p><p>There would be music.</p><p>It is unheard.</p><p>A scene sealed off from the night.</p><p>They don’t comment.<br>They don’t look away either.</p><p>He shifts first. Checks his watch. Then a small step.<br>His hand comes to the back of her skirt, firm, necessary — guiding, protective.</p><p>Warm.</p><p>She lets herself be moved. The skirt sways as she settles where he puts her.<br>Close to him.</p><p>He pauses to watch the windows again, as the movement quickens, then stills.</p><p>He draws her closer. Not rushed. Not gentle.<br>He holds her.</p><p>Pulling.</p><p>She rises onto her toes.<br>Balanced.<br>Suspended.</p><p>Her face is suddenly near — closer than it should be — breath shared, the faint sweet odour of make-up, cheap perfume cut with cold air.</p><p>Her coat is opened.<br>The soft crackle of fabric.<br>Loud in the quiet.</p><p>This is the part he remembers.<br>Always this part.</p><p>Her breast leans into his hand.</p><p>Not deliberate.<br>Not accidental either.<br>Just weight finding support.</p><p>His hand tightens.<br>Doesn’t move.</p><p>For a second his body remembers before he does.</p><p>The closeness.<br>The promise.<br>The instant before it changes forever.</p><p>He holds her there.</p><p>Unmoving.</p><p>The phone rings.</p><p>There is a pause.<br>Silent regret.</p><p>The phone box door is heavy after her lightness.<br>The sound loud as it closes behind him.</p><p>“Yes.”</p><p>He watches the girl through the glass. She is watching the window.</p><p>“Yes, we are here.”</p><p>He listens.</p><p>“Yes. An hour from now.”</p><p>He taps the glass and nods at her.</p><p>“Yes, I will call after it is done.”</p><p>He closes his eyes.</p><p>“Yes, as agreed.”</p><p>He listens again.</p><p>“Yes, I will make sure.”</p><p>He puts the phone down and opens the door.</p><p>She looks at him.</p><p>“Yes.”</p><p>It is all he needs to say.</p><p style=\"text-align: center;\">*</p><p>A country house. Before dawn.</p><p>Rich people live here.</p><p>It is dark and still, holding its breath.</p><p>He drives slowly with the lights off. Stops and waits.</p><p>Nothing. No sound. No movement.</p><p>He looks across at the girl.</p><p>There is a quarter moon.</p><p>The gravel crunches softly under their feet.</p><p>He kneels at the French windows. Wooden. A simple lock, opened with a thin blade. She stands close, her leg against his arm as he works.</p><p>The window clicks open.</p><p>He puts his hand on her leg and feels the warmth.</p><p>As he stands his hand moves up, raising the skirt.</p><p>At the top of the stocking, a moment of cool skin.</p><p>Now he can smell her.</p><p>Again they are close.</p><p>He grips her there and pushes her inside.</p><p>It is dark and they stand still until they can see.</p><p>They move quickly now. No noise. They know where to go.</p><p>A hall.</p><p>Stairs.</p><p>A corridor.</p><p>The door and into a bedroom.</p><p>Moonlight filters through lace curtains.</p><p>He turns to face her as he takes the heavy gun from his pocket. The suppressor is fitted.</p><p>The man hands it to the woman.</p><p>In the bed is a figure sleeping.</p><p>The woman walks forward.</p><p>There is a compressed sound, then another.</p><p>She turns and hands back the gun.</p><p>He grabs her by the hair and kisses her.</p><p>She presses against him.</p><p>Then they leave.</p><p style=\"text-align: center;\"><b></b><br></p><p style=\"text-align: center;\"><b></b><br></p><p><b></b><br></p>",

    title: "The Waterworks",
    genre: "Short Story",
    year: 2024,
    status: "free",
    author: "Written by Kevin Martin\n\nArt by Clerk Nocturne",
    content: "<div style=\"text-align: left;\"><b><h3 style=\"text-align: center;\">The Waterworks</h3><p>It’s hard to describe the waterworks—an old building sunk into a shallow depression on the edge of town. Long since abandoned, it has been replaced by modern engineering hidden beneath the ground, quietly serving the entire area. What remains of the old structure is now little more than a historical curiosity… and a lover’s lane.</p><p>I go there often. I cannot fully explain why. It frightens me, yes—but it fascinates me too. Each visit fills me with a strange and profound peace. I stand at the edge and look down into the dark, cruel water that gathers between the massive pipes deep within the empty tanks. Sometimes I imagine I see faces in that blackness. Sometimes I am almost certain that I do.</p><p>There is always something there, something terrible, that draws me closer to the edge—so close that it would take only the smallest push to send me tumbling down into certain death.</p><p>Once, long ago, I felt that push.</p><p>Only by twisting away at the last moment and collapsing to my knees did I save myself. When I recovered enough to look up, there was a young woman standing nearby. She smiled at me—softly, almost kindly—and then… how can I describe it? She simply faded. Dissolved into nothing.</p><p>I do not remember how I got home that day. At work, they asked if I had been ill. I had been gone for two days.</p><p>Where I went, what I did—I never discovered.</p><p>Over the years, I returned. Not often. Never by plan. Something would pull me back—an urge that felt less like a choice and more like a command. I never again felt that first violent push, but I would always see her. Or one like her. A girl standing at the edge, gazing into the dark water. She would turn, smile at me… and vanish.</p><p>And on my next visit, her face would be there below—among the others.</p><p>As time passed, something began to change in me. A quiet desire grew. A longing—not just to look, but to join them. At the same time, something else stirred: fragments of memory, elusive and restless, circling just beyond reach. They haunted me like a beast pacing in the shadows.</p><p>It was a dream that finally revealed the truth.</p><p>I woke screaming, tangled in sweat-soaked sheets, my heart pounding like a hammer. But the dream did not fade. It clung to me, sharp and vivid.</p><p>I saw the waterworks.</p><p>I saw myself.</p><p>I was dragging a girl.</p><p>I spoke to her softly—gentle words, sweet lies—while terror filled her eyes. I led her to the edge, stood her there… and gave that small, deliberate push.</p><p>I watched her fall.</p><p>I heard the water take her.</p><p>And as I relived it, a terrible, undeniable peace filled me.</p><p>That is when I knew.</p><p>I knew what I was. What I am.</p><p>Now that the truth has surfaced, it no longer hides. The feeling is louder—insistent, relentless. It presses against my thoughts, urging me forward, demanding to be obeyed.</p><p>I must act.</p><p>I have acted.</p><p>So many times.</p><p>But now, at last, the time has come to end it.</p><p>To go down.</p><p>To join the many pretty faces below.</p><p>And perhaps… to become a face myself.</p><p>Waiting.</p><p>Watching.</p><p>For the next one who comes to the edge.</p></b><br></div>",

const STATUS_CONFIG = {
  'published':     { label: 'Buy on Amazon →', btnClass: 'btn-published',     badge: 'Published',      badgeClass: 'badge-published'     },
  'coming-soon':   { label: 'Coming Soon',     btnClass: 'btn-coming-soon',   badge: 'Coming Soon',    badgeClass: 'badge-coming-soon'   },
  'free':          { label: 'Read Free',       btnClass: 'btn-free',          badge: 'Free',           badgeClass: 'badge-free'          },
  'fighting-back': { label: 'Fighting Back',   btnClass: 'btn-fighting-back', badge: 'Fighting Back',  badgeClass: 'badge-fighting-back' },
  'genesis':       { label: 'Genesis',         btnClass: 'btn-genesis',       badge: 'Genesis',        badgeClass: 'badge-genesis'       },
  'dark-thought':  { label: 'A Dark Thought',  btnClass: 'btn-dark-thought',  badge: 'A Dark Thought', badgeClass: 'badge-dark-thought'  },
};

const COVER_BTN_CLASS = {
  'published':     'cover-btn-published',
  'free':          'cover-btn-free',
  'coming-soon':   'cover-btn-inactive',
  'fighting-back': 'cover-btn-inactive',
  'genesis':       'cover-btn-inactive',
  'dark-thought':  'cover-btn-inactive',
};

let activeTag = '', searchQuery = '', sortOrder = 'newest';

document.getElementById('searchInput').addEventListener('input', e => {
  const val = e.target.value.toLowerCase().trim();
  if (val.startsWith('#')) {
    activeTag = val.slice(1);
    searchQuery = '';
  } else {
    searchQuery = val;
    activeTag = '';
  }
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortOrder = e.target.value;
  render();
});

const STATUS_ORDER = {'published':0,'coming-soon':1,'fighting-back':2,'genesis':3,'dark-thought':4,'free':5};

function getFiltered() {
  let list = [...BOOKS];
  if (activeTag) list = list.filter(b => (b.tags || []).includes(activeTag));
  if (searchQuery) list = list.filter(
    b => b.title.toLowerCase().includes(searchQuery) || (b.tags || []).some(t => t.includes(searchQuery))
  );
  list.sort((a,b) => {
    if (sortOrder === 'newest') {
      const so = (STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99);
      return so !== 0 ? so : b.year - a.year;
    }
    if (sortOrder === 'oldest') return a.year - b.year;
    if (sortOrder === 'az') return a.title.localeCompare(b.title);
    if (sortOrder === 'za') return b.title.localeCompare(a.title);
    return 0;
  });
  return list;
}

function openModal(idx) {
  const b = BOOKS[idx];
  const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];

  document.getElementById('rightTitleText').textContent = b.title;
  document.getElementById('leftGenre').textContent = b.genre + ' · ' + b.year;

  let html = b.content || b.desc || b.fullText || '';
  if (!html.includes('<')) {
    html = html
      .split('\n\n')
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('');
  }
  document.getElementById('leftDesc').innerHTML = html;

  const coverInner = document.getElementById('coverInner');
  if (b.cover) {
    coverInner.innerHTML = `<img src="${b.cover}" alt="${b.title}" onerror="this.parentElement.innerHTML='<div class=theatre-cover-placeholder>Cover<br>Coming Soon</div>'">`;
  } else {
    coverInner.innerHTML = `<div class="theatre-cover-placeholder">Cover<br>Coming Soon</div>`;
  }

  const btnCls = COVER_BTN_CLASS[b.status] || 'cover-btn-inactive';
  const coverAction = document.getElementById('coverAction');
  if (b.status === 'published' && b.link) {
    coverAction.innerHTML = `<a class="theatre-cover-btn ${btnCls}" href="${b.link}" target="_blank" rel="noopener"><span class="cover-status-label">Status</span>${cfg.label}</a>`;
  } else {
    coverAction.innerHTML = `<span class="theatre-cover-btn ${btnCls}"><span class="cover-status-label">Status</span>${cfg.label}</span>`;
  }

  const collectiveEl = document.getElementById('rightCollective');
  if (b.author === 'The Pitch Dark Press Collective') {
    document.getElementById('rightAuthorName').textContent = 'Lead author Kevin Martin';
    collectiveEl.style.display = 'block';
  } else if (b.author) {
    document.getElementById('rightAuthorName').textContent = b.author;
    collectiveEl.style.display = 'none';
  } else {
    document.getElementById('rightAuthorName').textContent = 'Kevin Martin';
    collectiveEl.style.display = 'none';
  }

  document.getElementById('rightTags').innerHTML = (b.tags || []).map(
    t => `<span class="right-tag" onclick="filterByTag('${t}');closeModal()">#${t}</span>`
  ).join(' ');

  document.getElementById('theatreAttribution').innerHTML =
    `<span class="attr-line1">Pitch Dark Press &copy; 2026</span><span class="attr-line2">Publish and be damned</span>`;

  const overlay = document.getElementById('theatreOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function collapseAll() {
  document.getElementById('expandModal').classList.remove('open');
  const descBtn = document.getElementById('descExpandBtn');
  descBtn.classList.remove('expanded');
  descBtn.textContent = '⤢';
}

function toggleExpand(which) {
  if (which !== 'desc') return;
  const modal = document.getElementById('expandModal');
  const descBtn = document.getElementById('descExpandBtn');
  const isOpen = modal.classList.contains('open');
  collapseAll();
  if (!isOpen) {
    document.getElementById('expandModalContent').innerHTML = document.getElementById('leftDesc').innerHTML;
    modal.classList.add('open');
    descBtn.classList.add('expanded');
    descBtn.textContent = '✕';
  }
}

function closeModal() {
  collapseAll();
  document.getElementById('theatreOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('theatreClose').addEventListener('click', closeModal);
document.getElementById('theatreOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('theatreOverlay') || e.target === document.getElementById('theatreStage')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function filterByTag(tag) {
  activeTag = activeTag === tag ? '' : tag;
  render();
}

function render() {
  const catalog = document.getElementById('catalog');
  const books = getFiltered();
  document.getElementById('countLine').innerHTML = `Showing <strong>${books.length}</strong> of <strong>${BOOKS.length}</strong> titles`;

  if (!books.length) {
    catalog.innerHTML = '<div class="no-results">No titles found</div>';
    return;
  }

  catalog.innerHTML = books.map((b, i) => {
    const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];
    const idx = BOOKS.indexOf(b);
    const tagsHtml = (b.tags || []).map(
      t => `<span class="book-tag" onclick="event.stopPropagation();filterByTag('${t}')">#${t}</span>`
    ).join('');
    const collectiveHtml = b.author ? `<div class="collective-tag">${b.author}</div>` : '';
    return `<div class="book-card" style="animation-delay:${i * 0.035}s" onclick="openModal(${idx})">
      <div class="cover-wrap">
        <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.style.opacity='0'">
        <span class="status-badge ${cfg.badgeClass}">${cfg.badge}</span>
      </div>
      <div class="genre-tag">${b.genre} · ${b.year}</div>
      ${collectiveHtml}
      <div class="book-title">${b.title}</div>
      <div class="book-tags">${tagsHtml}</div>
      <span class="action-btn ${cfg.btnClass}">${cfg.label}</span>
    </div>`;
  }).join('');
}

document.querySelectorAll('.site-header-nav a').forEach(link => {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    const href = this.href;
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = href; }, 300);
  });
});

render();
</script>

<script>
function reportHeight() {
  const height = document.body.scrollHeight;
  window.parent.postMessage({ type: 'manifestHeight', height: height }, '*');
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
const observer = new MutationObserver(reportHeight);
observer.observe(document.body, { childList: true, subtree: true });
</script>
