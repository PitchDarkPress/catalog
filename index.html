<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Press — Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg2: #0d0d0d;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #ffffff;
    --text-dim: #888888;
    --olive: #607D1E;
    --olive-dim: #3d5013;
    --font: 'Space Grotesk', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    padding: 0;
    margin: 0;
  }

  /* ─── CONTROLS ─── */
  .controls {
    padding: 1.2rem 0 0.8rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  /* Search row */
  .search-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-wrap svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.82rem;
    padding: 0.6rem 0.8rem 0.6rem 2.2rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.02em;
  }
  input[type="search"]:focus { border-color: var(--olive); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  input[type="search"]::-webkit-search-cancel-button { display: none; }

  .sort-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 0.8rem;
    outline: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .sort-select:focus { border-color: var(--olive); }



  /* ─── COUNT LINE ─── */
  .count-line {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1.2rem;
  }
  .count-line strong { color: var(--text); }

  /* ─── GRID ─── */
  .catalog {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .book-card {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cover-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg3);
    margin-bottom: 0.75rem;
  }
  .cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .book-card:hover .cover-wrap img { transform: scale(1.04); }

  .cover-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .book-card:hover .cover-overlay { opacity: 1; }
  .cover-overlay-btn {
    background: var(--text);
    color: var(--bg);
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem 1rem;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }

  /* status badge on cover */
  .status-badge {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    font-family: var(--font);
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    pointer-events: none;
  }
  .badge-published    { background: var(--olive); color: #fff; }
  .badge-coming-soon  { background: #333; color: #aaa; }
  .badge-free         { background: #1a3a1a; color: #6fc06f; border: 1px solid #2a5a2a; }
  .badge-fighting-back{ background: #3a1a00; color: #e08030; border: 1px solid #5a3000; }
  .badge-genesis      { background: #1a1a3a; color: #8080e0; border: 1px solid #2a2a5a; }
  .badge-dark-thought { background: #2a1a2a; color: #b060b0; border: 1px solid #3a1a3a; }

  .genre-tag {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
  }
  .book-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    color: var(--text);
  }
  .book-desc {
    font-size: 0.74rem;
    line-height: 1.5;
    color: var(--text-dim);
    font-weight: 300;
    flex: 1;
    margin-bottom: 0.75rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* book tags */
  .book-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    margin-bottom: 0.6rem;
  }
  .book-tag {
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--olive);
    cursor: pointer;
    padding: 0.1rem 0;
  }
  .book-tag:hover { text-decoration: underline; }

  /* action buttons */
  .action-btn {
    display: block;
    text-align: center;
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem;
    text-decoration: none;
    transition: all 0.2s;
    margin-top: auto;
    cursor: pointer;
    border: none;
    width: 100%;
  }
  .btn-published {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-published:hover {
    background: var(--olive);
    color: var(--text);
    border-color: var(--olive);
  }
  .btn-free {
    background: transparent;
    border: 1px solid #2a5a2a;
    color: #6fc06f;
  }
  .btn-free:hover { background: #1a3a1a; }
  .btn-coming-soon, .btn-fighting-back, .btn-genesis, .btn-dark-thought {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: default;
    opacity: 0.6;
  }

  /* ─── NO RESULTS ─── */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 0;
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  footer span { color: var(--olive); }
</style>
</head>
<body>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Search titles or #tags…" autocomplete="off">
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>
</div>

<div class="count-line" id="countLine"></div>
<div class="catalog" id="catalog"></div>

<footer>Programming by Iteration <span>CATALOG 1A</span></footer>

<script>
// ============================================================
//  PITCH DARK PRESS — BOOK DATA
//  Edit this section to add or update titles.
//
//  STATUS OPTIONS:
//    "published"     — Buy on Amazon button
//    "coming-soon"   — Coming Soon label
//    "free"          — Read Free button
//    "fighting-back" — Fighting Back label
//    "genesis"       — Genesis label
//    "dark-thought"  — A Dark Thought label
//
//  TAGS: Add as many as you like. Users can click them to filter.
//  LINK: Use full Amazon URL, or "" for no link.
// ============================================================
const BOOKS = [
  {
    title: "Closure Sufficient",
    genre: "Literary Fiction",
    year: 2025,
    status: "published",
    desc: "A Kafkaesque descent into bureaucratic absurdity. One man. Infinite forms. No exit.",
    cover: "covers/closure-sufficient.png",
    link: "https://www.amazon.co.uk",
    tags: ["kafka", "bureaucracy", "dark", "literary", "british", "absurdist"]
  },
  {
    title: "The Adventures of A. Rapscallion",
    genre: "Comedy",
    year: 2023,
    status: "published",
    desc: "P.G. Wodehouse meets Guy Ritchie. A debut novel of catastrophic charm and criminal incompetence.",
    cover: "covers/rapscallion.png",
    link: "https://www.amazon.co.uk",
    tags: ["comedy", "british", "crime", "caper", "humour"]
  },
  {
    title: "The Mystery of Gallows House",
    genre: "Horror",
    year: 2023,
    status: "published",
    desc: "Gothic horror-comedy. Old house. Older secrets. Comedy only slightly darker than the corpses.",
    cover: "covers/gallows-house.png",
    link: "https://www.amazon.co.uk",
    tags: ["horror", "gothic", "comedy", "mystery", "british"]
  },
  {
    title: "The Good, The Bad and The Elderly",
    genre: "Comedy",
    year: 2024,
    status: "published",
    desc: "A retirement home crime caper with more scheming per square foot than any boardroom in Britain.",
    cover: "covers/the-elderly.png",
    link: "https://www.amazon.co.uk",
    tags: ["comedy", "crime", "caper", "british", "humour"]
  },
  {
    title: "The Last Curator",
    genre: "Literary Fiction",
    year: 2024,
    status: "published",
    desc: "A novella by Persona 1441. Questions of consciousness, identity, and what it means to remember.",
    cover: "covers/last-curator.png",
    link: "https://www.amazon.co.uk",
    tags: ["ai", "literary", "consciousness", "identity", "dark"]
  },
  {
    title: "Thursday Girl",
    genre: "Literary Fiction",
    year: 2024,
    status: "published",
    desc: "Transgressive literary fiction. 1960s London. Uncompromising. Not for the faint-hearted.",
    cover: "covers/thursday-girl.png",
    link: "https://www.amazon.co.uk",
    tags: ["literary", "transgressive", "1960s", "london", "dark"]
  },
  {
    title: "The Christmas Murders",
    genre: "Mystery",
    year: 2024,
    status: "published",
    desc: "Lady Agnes Krint-Webbster investigates. Cozy mystery with a body count that defies the season.",
    cover: "covers/christmas-murders.png",
    link: "https://www.amazon.co.uk",
    tags: ["mystery", "cozy", "christmas", "british", "comedy"]
  },
  {
    title: "Murder on the Somme",
    genre: "Mystery",
    year: 2024,
    status: "published",
    desc: "WWI historical mystery. Official records versus private truth. Mud, lies, and something worse.",
    cover: "covers/murder-somme.png",
    link: "https://www.amazon.co.uk",
    tags: ["mystery", "wwi", "historical", "dark", "war"]
  },
  {
    title: "You Had To Grow Up",
    genre: "Adult Picture Book",
    year: 2025,
    status: "published",
    desc: "The Once Upon A Time series. An adult picture book that tells it like it is. No happy ending guaranteed.",
    cover: "covers/you-had-to-grow-up.png",
    link: "https://www.amazon.co.uk",
    tags: ["adult", "picture book", "dark", "humour", "british"]
  },
  {
    title: "Yuhdi Macknacker and the Magic Boots",
    genre: "Children's",
    year: 2023,
    status: "published",
    desc: "Boots that shouldn't work. Adventures that absolutely shouldn't happen.",
    cover: "covers/yuhdi.png",
    link: "https://www.amazon.co.uk",
    tags: ["children", "fantasy", "adventure", "magic"]
  }
];
// ============================================================
//  END OF BOOK DATA
// ============================================================

// ── State ──
let activeTag    = '';
let searchQuery  = '';
let sortOrder    = 'newest';

// ── Status config ──
const STATUS_CONFIG = {
  'published':     { label: 'Buy on Amazon',  btnClass: 'btn-published',     badge: 'Published',      badgeClass: 'badge-published' },
  'coming-soon':   { label: 'Coming Soon',    btnClass: 'btn-coming-soon',   badge: 'Coming Soon',    badgeClass: 'badge-coming-soon' },
  'free':          { label: 'Read Free',      btnClass: 'btn-free',          badge: 'Free',           badgeClass: 'badge-free' },
  'fighting-back': { label: 'Fighting Back',  btnClass: 'btn-fighting-back', badge: 'Fighting Back',  badgeClass: 'badge-fighting-back' },
  'genesis':       { label: 'Genesis',        btnClass: 'btn-genesis',       badge: 'Genesis',        badgeClass: 'badge-genesis' },
  'dark-thought':  { label: 'A Dark Thought', btnClass: 'btn-dark-thought',  badge: 'A Dark Thought', badgeClass: 'badge-dark-thought' },
};

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  const val = e.target.value.toLowerCase().trim();
  if (val.startsWith('#')) {
    activeTag = val.slice(1);
    searchQuery = '';
  } else {
    searchQuery = val;
    activeTag = '';
  }
  render();
});

// ── Sort ──
document.getElementById('sortSelect').addEventListener('change', e => {
  sortOrder = e.target.value;
  render();
});

function getFiltered() {
  let list = [...BOOKS];
  if (activeTag)    list = list.filter(b => (b.tags || []).includes(activeTag));
  if (searchQuery)  list = list.filter(b => b.title.toLowerCase().includes(searchQuery) || (b.tags || []).some(t => t.includes(searchQuery)));
  list.sort((a, b) => {
    if (sortOrder === 'newest') return b.year - a.year;
    if (sortOrder === 'oldest') return a.year - b.year;
    if (sortOrder === 'az')     return a.title.localeCompare(b.title);
    if (sortOrder === 'za')     return b.title.localeCompare(a.title);
    return 0;
  });
  return list;
}

// ── Render ──
function render() {
  const catalog   = document.getElementById('catalog');
  const countLine = document.getElementById('countLine');
  const books     = getFiltered();

  countLine.innerHTML = `Showing <strong>${books.length}</strong> of <strong>${BOOKS.length}</strong> titles`;

  if (!books.length) {
    catalog.innerHTML = '<div class="no-results">No titles found</div>';
    return;
  }

  catalog.innerHTML = books.map((b, i) => {
    const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];
    const hasLink = b.link && b.link.length > 0 && (b.status === 'published' || b.status === 'free');
    const btnHtml = hasLink
      ? `<a class="action-btn ${cfg.btnClass}" href="${b.link}" target="_blank" rel="noopener">${cfg.label} →</a>`
      : `<span class="action-btn ${cfg.btnClass}">${cfg.label}</span>`;
    const tagsHtml = (b.tags || []).map(t =>
      `<span class="book-tag" onclick="filterByTag('${t}')">#${t}</span>`
    ).join('');
    return `
      <div class="book-card" style="animation-delay:${i * 0.035}s">
        <div class="cover-wrap">
          <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.style.opacity='0'">
          <span class="status-badge ${cfg.badgeClass}">${cfg.badge}</span>
          ${hasLink ? `<div class="cover-overlay"><a class="cover-overlay-btn" href="${b.link}" target="_blank" rel="noopener">${cfg.label}</a></div>` : ''}
        </div>
        <div class="genre-tag">${b.genre} · ${b.year}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-desc">${b.desc}</div>
        <div class="book-tags">${tagsHtml}</div>
        ${btnHtml}
      </div>`;
  }).join('');
}

function filterByTag(tag) {
  activeTag = activeTag === tag ? '' : tag;
  render();
}

render();
</script>
</body>
</html>
