<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manifest – Pitch Dark Press</title>
<style>
body {
    font-family: Georgia, serif;
    background: #000;
    color: #f2f2f2;
    margin: 0;
    padding: 40px;
}
h1 {
    text-align: center;
    margin: 0 0 40px 0;
    font-size: 3rem;
    font-weight: 700;
}
.grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 20px;
}
.card {
    background: #0b0b0b;
    border: 1px solid #1f1f1f;
    padding: 12px;
    cursor: pointer;
}
.card:hover {
    border-color: #3a3a3a;
}
.status-box {
    font-size: 12px;
    color: #88b21f;
    margin-bottom: 8px;
}
.cover {
    background: #1b1b1b;
    height: 180px;
    margin-bottom: 10px;
}
.genre {
    font-size: 12px;
    color: #bdbdbd;
    margin-bottom: 4px;
}
.title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
}
.desc {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 10px;
    color: #f2f2f2;
}
.tags {
    font-size: 12px;
    color: #88b21f;
    line-height: 1.4;
    word-break: break-word;
}
#readerOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 1000;
    padding: 28px;
    box-sizing: border-box;
}
#readerModal {
    width: min(1220px, 100%);
    height: min(92vh, 980px);
    margin: 0 auto;
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    background: #000;
    border: 2px solid #3d3d3d;
    box-sizing: border-box;
    padding: 22px;
    display: flex;
    flex-direction: column;
}
#closeReader {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 56px;
    height: 56px;
    border: 2px solid #3d3d3d;
    background: #000;
    color: #ff0000;
    font-size: 42px;
    line-height: 1;
    cursor: pointer;
    font-family: Arial, sans-serif;
}
#readerHeader {
    text-align: center;
    margin: 8px 80px 18px 80px;
    flex: 0 0 auto;
}
#readerTitle {
    margin: 0;
    font-size: 3rem;
    font-weight: 400;
    line-height: 1.1;
}
#readerTitleLine {
    width: 420px;
    max-width: 100%;
    margin: 10px auto 14px auto;
    border-top: 2px solid #7a7a7a;
}
#readerAuthor {
    font-size: 2.1rem;
    line-height: 1.2;
}
#readerBody {
    flex: 1 1 auto;
    min-height: 0;
    border: 2px solid #4a4a4a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#readerContent {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 18px 18px 0 18px;
    box-sizing: border-box;
    font-size: 1.15rem;
    line-height: 1.55;
}
#readerContent p {
    margin: 0 0 1.5em 0;
}
#readerMetaRow {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    border-top: 2px solid #4a4a4a;
}
.reader-meta-box {
    padding: 12px 18px;
    border-right: 2px solid #4a4a4a;
    font-size: 1.05rem;
    line-height: 1.3;
}
.reader-meta-box:last-child {
    border-right: 0;
}
.reader-meta-label {
    color: #88b21f;
}
body.modal-open {
    overflow: hidden;
}
@media (max-width: 1100px) {
    .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    #readerModal {
        width: min(980px, 100%);
    }
    #readerTitle {
        font-size: 2.4rem;
    }
    #readerAuthor {
        font-size: 1.7rem;
    }
}
@media (max-width: 700px) {
    body {
        padding: 20px;
    }
    h1 {
        font-size: 2.2rem;
        margin-bottom: 24px;
    }
    .grid {
        grid-template-columns: 1fr;
    }
    #readerOverlay {
        padding: 12px;
    }
    #readerModal {
        height: min(94vh, 94vh);
        padding: 14px;
    }
    #closeReader {
        top: 10px;
        right: 10px;
        width: 46px;
        height: 46px;
        font-size: 34px;
    }
    #readerHeader {
        margin: 6px 52px 14px 52px;
    }
    #readerTitle {
        font-size: 1.9rem;
    }
    #readerAuthor {
        font-size: 1.3rem;
    }
    #readerContent {
        font-size: 1rem;
        padding: 14px 14px 0 14px;
    }
    #readerMetaRow {
        grid-template-columns: 1fr;
    }
    .reader-meta-box {
        border-right: 0;
        border-bottom: 2px solid #4a4a4a;
    }
    .reader-meta-box:last-child {
        border-bottom: 0;
    }
}
</style>
</head>
<body>
<h1>Manifest</h1>
<div class="grid" id="grid"></div>
<div id="readerOverlay" onclick="overlayClose(event)">
    <div id="readerModal">
        <button id="closeReader" onclick="closeReader()" aria-label="Close reader">X</button>
        <div id="readerHeader">
            <h2 id="readerTitle"></h2>
            <div id="readerTitleLine"></div>
            <div id="readerAuthor"></div>
        </div>
        <div id="readerBody">
            <div id="readerContent"></div>
            <div id="readerMetaRow">
                <div class="reader-meta-box">
                    <span class="reader-meta-label">Status:</span>
                    <span id="readerStatusValue"></span>
                </div>
                <div class="reader-meta-box">
                    <span class="reader-meta-label">Genre:</span>
                    <span id="readerGenreValue"></span>
                </div>
                <div class="reader-meta-box">
                    <span id="readerTagsValue"></span>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
async function loadBooks() {
    let books = [];
    try {
        const res = await fetch("books.json");
        books = await res.json();
        if (!Array.isArray(books)) books = [];
    } catch {
        books = [];
    }
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    books.forEach((b) => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openReader(b);

        const status = document.createElement("div");
        status.className = "status-box";
        status.textContent = b.status || "";

        const cover = document.createElement("div");
        cover.className = "cover";

        const genre = document.createElement("div");
        genre.className = "genre";
        genre.textContent = b.genre || "";

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = b.title || "";

        const desc = document.createElement("div");
        desc.className = "desc";
        const previewText = (b.content || "").replace(/\n+/g, " ").trim();
        desc.textContent = previewText ? previewText.substring(0, 120) + "..." : "";

        const tags = document.createElement("div");
        tags.className = "tags";
        if (Array.isArray(b.tags) && b.tags.length > 0) {
            tags.textContent = b.tags.map(t => "#" + t).join(" ");
        }

        card.appendChild(status);
        card.appendChild(cover);
        card.appendChild(genre);
        card.appendChild(title);
        card.appendChild(desc);
        card.appendChild(tags);
        grid.appendChild(card);
    });
}
function openReader(book) {
    document.getElementById("readerTitle").textContent = book.title || "";
    document.getElementById("readerAuthor").textContent = book.author || "";
    document.getElementById("readerStatusValue").textContent = book.status || "";
    document.getElementById("readerGenreValue").textContent = book.genre || "";
    const tagsValue = document.getElementById("readerTagsValue");
    if (Array.isArray(book.tags) && book.tags.length > 0) {
        tagsValue.textContent = book.tags.map(t => "#" + t).join(" ");
    } else {
        tagsValue.textContent = "";
    }
    const contentBox = document.getElementById("readerContent");
    contentBox.innerHTML = "";
    const text = book.content || "";
    const paragraphs = text.split(/\n\s*\n/);
    paragraphs.forEach(paragraph => {
        const cleanText = paragraph.trim();
        if (cleanText !== "") {
            const p = document.createElement("p");
            p.textContent = cleanText;
            contentBox.appendChild(p);
        }
    });
    document.getElementById("readerOverlay").style.display = "block";
    document.body.classList.add("modal-open");
    contentBox.scrollTop = 0;
}
function closeReader() {
    document.getElementById("readerOverlay").style.display = "none";
    document.body.classList.remove("modal-open");
}
function overlayClose(event) {
    if (event.target.id === "readerOverlay") {
        closeReader();
    }
}
document.addEventListener("keydown", function(event) {
    if (event.key === "Escape") {
        closeReader();
    }
});
loadBooks();
</script>
</body>
</html>
