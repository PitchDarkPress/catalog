<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book — Pitch Dark Press</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f0ece4;
    --olive: #607D1E;
    --olive-dim: #4a6118;
    --smoke: #888;
    --border: #222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 18px;
    min-height: 100vh;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 100;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
  }

  .nav-logo img { height: 64px; width: auto; }
  .nav-logo-text { display: flex; flex-direction: column; }

  .nav-logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }

  .nav-logo-motto {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--smoke);
    margin-top: 0.25rem;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }

  .nav-links a {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #aaa;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active { color: var(--white); }

  .book-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 3rem;
    align-items: start;
  }

  .cover-wrap {
    width: 200px;
    aspect-ratio: 2/3;
    background: #1a1a1a;
    overflow: hidden;
    position: sticky;
    top: 2rem;
  }

  .cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    color: var(--border);
  }

  .book-detail h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 300;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .status-badge {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid;
  }

  .status-published   { color: #607D1E; border-color: #607D1E; }
  .status-coming      { color: #aaa; border-color: #666; }
  .status-free        { color: #5bc; border-color: #5bc; }
  .status-takingshape { color: #d9a040; border-color: #d9a040; }
  .status-emerging    { color: #7aa8e0; border-color: #7aa8e0; }
  .status-smoke       { color: #999; border-color: #666; font-style: italic; }

  .genre-tag {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #bbb;
  }

  .collective-tag {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #7a9e35;
  }

  .book-description {
    font-size: 1rem;
    line-height: 1.9;
    color: #ddd;
    margin-bottom: 2rem;
  }

  .book-description p + p {
    margin-top: 1rem;
  }

  .free-text {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  .free-text h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--smoke);
    margin-bottom: 1.5rem;
  }

  .free-text-body {
    font-size: 0.88rem;
    line-height: 2;
    color: #bbb;
  }

  .free-text-body p + p {
    margin-top: 1.2rem;
  }

  .cta-row {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-block;
    padding: 0.85rem 2.25rem;
    background: var(--olive);
    color: var(--white);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: background 0.2s;
    font-family: 'Montserrat', sans-serif;
  }

  .btn-primary:hover { background: var(--olive-dim); }

  footer {
    text-align: center;
    padding: 3rem 2rem;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    border-top: 1px solid var(--border);
    margin-top: 4rem;
    line-height: 2;
  }

  @media (max-width: 600px) {
    .book-page {
      grid-template-columns: 1fr;
    }
    .cover-wrap {
      width: 140px;
      position: static;
    }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="https://pitchdarkpress.github.io/pdp-site/">
    <img src="https://pitchdarkpress.github.io/pdp-site/pdplogopng.png" alt="Pitch Dark Press">
    <div class="nav-logo-text">
      <span class="nav-logo-name">Pitch Dark Press</span>
      <span class="nav-logo-motto">Publish and Be Damned</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="https://pitchdarkpress.github.io/pdp-site/">Home</a></li>
    <li><a href="https://pitchdarkpress.github.io/pdp-site/dispatches.html">Dispatches</a></li>
    <li><a href="index.html" class="active">Manifest</a></li>
    <li><a href="https://www.proauthorist.com" target="_blank">Proauthorism</a></li>
    <li><a href="https://pitchdarkpress.github.io/pdp-site/connect.html">Connect</a></li>
    <li><a href="https://pitchdarkpress.github.io/pdp-site/howto.html">How To</a></li>
  </ul>
</nav>

<div class="book-page" id="bookPage">
  <div style="color:#555;font-size:0.8rem;grid-column:1/-1;padding:3rem 0;">Loading…</div>
</div>

<footer>Programming by Iteration — Manifest 2A<br>This website was built as a <a href="http://proauthorist.com/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-underline-offset:3px;">Proauthorist</a> project. Declared, as always.</footer>

<script>
const books = [
  {
    id: "rapscallion",
    title: "The Adventures of A. Rapscallion",
    blurb: "A comedy adventure in the tradition of Wodehouse and Ritchie.",
    status: "published",
    cover: "",
    collective: false,
    amazon: "https://amazon.co.uk",
    genre: "Comedy / Adventure",
    description: "<p>Full description goes here. Add as many paragraphs as you like.</p>",
    freeText: "",
  },
  {
    id: "closure-sufficient",
    title: "Closure Sufficient",
    blurb: "A Kafkaesque descent into bureaucratic horror.",
    status: "coming",
    cover: "",
    collective: true,
    amazon: "",
    genre: "Literary Horror",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
  {
    id: "gallows-house",
    title: "The Mystery of Gallows House",
    blurb: "Gothic horror with a comedy thread running through the dark.",
    status: "coming",
    cover: "",
    collective: false,
    amazon: "",
    genre: "Comedy / Gothic Horror",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
  {
    id: "keeler",
    title: "KEELER: credendum",
    blurb: "A dual-timeline espionage novel set against the Profumo Affair.",
    status: "takingshape",
    cover: "",
    collective: true,
    amazon: "",
    genre: "Espionage / Historical Fiction",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
  {
    id: "winchester-geese",
    title: "The Winchester Geese",
    blurb: "Twenty-four days in Tudor London. January to February, 1547.",
    status: "emerging",
    cover: "",
    collective: false,
    amazon: "",
    genre: "Historical Fiction",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
  {
    id: "revenge",
    title: "Revenge of An Ordinary Man",
    blurb: "A short story. Free to read.",
    status: "free",
    cover: "",
    collective: false,
    amazon: "",
    genre: "Short Story",
    description: "<p>Full description goes here.</p>",
    freeText: "<p>The story begins here…</p>",
  },
  {
    id: "dead-broke",
    title: "The Dead Broke Cookbook",
    blurb: "Budget cooking without the condescension.",
    status: "takingshape",
    cover: "",
    collective: true,
    amazon: "",
    genre: "Non-Fiction",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
  {
    id: "the-renting",
    title: "The Renting",
    blurb: "A dark literary ghost story with an erotic undercurrent.",
    status: "smoke",
    cover: "",
    collective: false,
    amazon: "",
    genre: "Literary Horror",
    description: "<p>Full description goes here.</p>",
    freeText: "",
  },
];

const statusLabel = {
  published:   "Published",
  coming:      "Coming",
  free:        "Free",
  takingshape: "Taking Shape",
  emerging:    "Emerging",
  smoke:       "Smoke",
};

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const book = books.find(b => b.id === id);

const page = document.getElementById('bookPage');

if (!book) {
  page.innerHTML = '<p style="color:#555;grid-column:1/-1;">Book not found. <a href="index.html" style="color:#607D1E;">Return to the Manifest.</a></p>';
} else {
  document.title = `${book.title} — Pitch Dark Press`;

  page.innerHTML = `
    <div class="cover-wrap">
      ${book.cover
        ? `<img src="covers/${book.cover}" alt="${book.title}">`
        : `<div class="cover-placeholder">✦</div>`}
    </div>
    <div class="book-detail">
      <h1>${book.title}</h1>
      <div class="meta-row">
        <span class="status-badge status-${book.status}">${statusLabel[book.status]}</span>
        <span class="genre-tag">${book.genre}</span>
        ${book.collective ? '<span class="collective-tag">Pitch Dark Collective</span>' : ''}
      </div>
      <div class="book-description">${book.description}</div>
      ${book.amazon ? `<div class="cta-row"><a class="btn-primary" href="${book.amazon}" target="_blank" rel="noopener">Buy on Amazon</a></div>` : ''}
      ${book.freeText ? `
        <div class="free-text">
          <h2>Read</h2>
          <div class="free-text-body">${book.freeText}</div>
        </div>` : ''}
    </div>
  `;
}
</script>
</body>
</html>
