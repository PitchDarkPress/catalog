<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book — Pitch Dark Press</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--white:#f0ece4;--olive:#607D1E;--olive-dim:#4a6118;--smoke:#888;--border:#222}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;font-size:18px;min-height:100vh}
  .back-bar{padding:1.25rem 2rem;border-bottom:1px solid var(--border)}
  .back-link{font-size:0.95rem;letter-spacing:0.15em;text-transform:uppercase;color:#ccc;text-decoration:none;transition:color 0.2s}
  .back-link:hover{color:var(--white)}
  .back-link::before{content:"← "}
  .book-page{max-width:900px;margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:200px 1fr;gap:3rem;align-items:start}
  .cover-wrap{width:200px;aspect-ratio:2/3;background:#1a1a1a;overflow:hidden;position:sticky;top:2rem}
  .cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
  .cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--border)}
  .book-detail h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;line-height:1.15;margin-bottom:1rem}
  .meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:0.75rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  .status-badge{font-size:0.8rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:0.3rem 0.75rem;border:1px solid}
  .status-published{color:#607D1E;border-color:#607D1E}
  .status-coming{color:#aaa;border-color:#666}
  .status-free{color:#5bc;border-color:#5bc}
  .status-takingshape{color:#d9a040;border-color:#d9a040}
  .status-emerging{color:#7aa8e0;border-color:#7aa8e0}
  .status-smoke{color:#999;border-color:#666;font-style:italic}
  .genre-tag{font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:#bbb}
  .collective-tag{font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:#7a9e35}
  .book-description{font-size:1rem;line-height:1.9;color:#ddd;margin-bottom:2rem}
  .book-description p+p{margin-top:1rem}
  .free-text{margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border)}
  .free-text h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;color:#bbb;margin-bottom:1.5rem}
  .free-text-body{font-size:1rem;line-height:2;color:#ccc}
  .free-text-body p+p{margin-top:1.2rem}
  .cta-row{margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap}
  .btn-primary{display:inline-block;padding:0.85rem 2.25rem;background:var(--olive);color:var(--white);text-decoration:none;font-size:0.85rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;transition:background 0.2s;font-family:'Montserrat',sans-serif}
  .btn-primary:hover{background:#4a6118}
  footer{text-align:center;padding:3rem 2rem;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:#888;border-top:1px solid var(--border);margin-top:4rem;line-height:2}
  @media(max-width:600px){.book-page{grid-template-columns:1fr}.cover-wrap{width:140px;position:static}}
</style>
</head>
<body>
<div class="back-bar"><a class="back-link" href="index.html">The Manifest</a></div>
<div class="book-page" id="bookPage"><div style="color:#555;font-size:0.9rem;grid-column:1/-1;padding:3rem 0;">Loading…</div></div>

const statusLabel={published:"Published",coming:"Coming",free:"Free",takingshape:"Taking Shape",emerging:"Emerging",smoke:"Smoke"};
const params=new URLSearchParams(window.location.search);
const book=books.find(b=>b.id===params.get('id'));
const page=document.getElementById('bookPage');
if(!book){
  page.innerHTML='<p style="color:#555;grid-column:1/-1;">Book not found. <a href="index.html" style="color:#607D1E;">Return to the Manifest.</a></p>';
}else{
  document.title=book.title+' — Pitch Dark Press';
  const descHtml=book.description?(book.description.includes('<p>')?book.description:book.description.split('\n\n').map(p=>`<p>${p}</p>`).join('')):'';
  const freeHtml=book.freeText?(book.freeText.includes('<p>')?book.freeText:book.freeText.split('\n\n').map(p=>`<p>${p}</p>`).join('')):'';
  page.innerHTML=`

</body>
</html>
