<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Press — Manifest</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg2: #0d0d0d;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #ffffff;
    --text-dim: #888888;
    --olive: #607D1E;
    --font: 'Space Grotesk', sans-serif;
    --phos: #39ff6a;
    --phos-dim: #1a7a35;
    --phos-bg: rgba(0,15,6,0.92);
    --phos-border: rgba(57,255,106,0.25);
    --phos-glow: 0 0 8px rgba(57,255,106,0.35), 0 0 20px rgba(57,255,106,0.12);
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    padding: 0; margin: 0;
  }

  /* ── CATALOG CONTROLS ── */
  .controls { padding: 1.2rem 0 0.8rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .search-row { display: flex; align-items: center; gap: 0.8rem; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  input[type="search"] { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 0.82rem; padding: 0.6rem 0.8rem 0.6rem 2.2rem; outline: none; transition: border-color 0.2s; }
  input[type="search"]:focus { border-color: var(--olive); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  .sort-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); font-family: var(--font); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.6rem 0.8rem; outline: none; cursor: pointer; white-space: nowrap; }
  .sort-select:focus { border-color: var(--olive); }
  .count-line { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.2rem; }
  .count-line strong { color: var(--text); }

  /* ── CATALOG GRID ── */
  .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .book-card { display: flex; flex-direction: column; cursor: pointer; animation: fadeUp 0.35s ease both; transition: opacity 0.2s; }
  .book-card:hover { opacity: 0.85; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .cover-wrap { position: relative; aspect-ratio: 2/3; overflow: hidden; border: 1px solid var(--border); background: var(--bg3); margin-bottom: 0.75rem; }
  .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .book-card:hover .cover-wrap img { transform: scale(1.04); }
  .status-badge { position: absolute; top: 0.5rem; left: 0.5rem; font-family: var(--font); font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.2rem 0.5rem; pointer-events: none; }
  .badge-published    { background: var(--olive); color: #fff; }
  .badge-coming-soon  { background: #333; color: #aaa; }
  .badge-free         { background: #1a3a1a; color: #6fc06f; border: 1px solid #2a5a2a; }
  .badge-fighting-back{ background: #3a1a00; color: #e08030; border: 1px solid #5a3000; }
  .badge-genesis      { background: #1a1a3a; color: #8080e0; border: 1px solid #2a2a5a; }
  .badge-dark-thought { background: #2a1a2a; color: #b060b0; border: 1px solid #3a1a3a; }
  .genre-tag { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.2rem; }
  .collective-tag { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--olive); margin-bottom: 0.3rem; }
  .book-title { font-size: 0.88rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.35rem; color: var(--text); }
  .book-desc { font-size: 0.74rem; line-height: 1.5; color: var(--text-dim); font-weight: 300; flex: 1; margin-bottom: 0.6rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .book-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.6rem; }
  .book-tag { font-size: 0.58rem; letter-spacing: 0.08em; color: var(--olive); cursor: pointer; }
  .book-tag:hover { text-decoration: underline; }
  .action-btn { display: block; text-align: center; font-family: var(--font); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.55rem; text-decoration: none; transition: all 0.2s; margin-top: auto; border: none; width: 100%; box-sizing: border-box; }
  .btn-published { background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; }
  .btn-published:hover { background: var(--olive); color: var(--text); border-color: var(--olive); }
  .btn-free { background: transparent; border: 1px solid #2a5a2a; color: #6fc06f; cursor: pointer; }
  .btn-free:hover { background: #1a3a1a; }
  .btn-coming-soon, .btn-fighting-back, .btn-genesis, .btn-dark-thought { background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: default; opacity: 0.6; }

  /* ══════════════════════════════════════════════
     THEATRICAL MODAL — BATTLEZONE PHOSPHOR REVEAL
  ══════════════════════════════════════════════ */

  .theatre-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0);
    cursor: pointer;
    overflow-y: auto;
  }
  .theatre-overlay.open {
    display: block;
    animation: curtainFall 0.35s ease forwards;
  }
  @keyframes curtainFall {
    from { background: rgba(0,0,0,0); }
    to   { background: rgba(0,0,0,0.75); }
  }
  .theatre-overlay.open::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 1;
  }

  .theatre-stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 5rem;
    cursor: default;
    position: relative;
    z-index: 2;
  }

  /* ── MARQUEE TITLE ── */
  .theatre-marquee {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 1.4rem 2rem 0;
    opacity: 0;
    transform: translateY(-40px) scaleY(0.6);
    transform-origin: top center;
    pointer-events: none;
  }
  .theatre-marquee.animate { animation: titleRise 1.0s cubic-bezier(0.34, 1.2, 0.64, 1) 2.2s forwards; }
  @keyframes titleRise {
    from { opacity: 0; transform: translateY(-40px) scaleY(0.6); }
    to   { opacity: 1; transform: translateY(0) scaleY(1); }
  }
  .theatre-marquee.animate .marquee-rule { animation: ruleBloom 0.7s ease 3.1s forwards; }
  @keyframes ruleBloom { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  .marquee-title {
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--phos);
    line-height: 1.1;
    text-shadow: var(--phos-glow);
    font-family: 'Courier New', monospace;
  }
  .marquee-rule {
    width: 80px; height: 1px;
    background: var(--phos);
    margin: 0.55rem auto 0;
    box-shadow: var(--phos-glow);
    transform: scaleX(0);
    transform-origin: center;
  }

  /* ── CLOSING — petals fold back ── */
  .theatre-overlay.closing { animation: curtainRise 0.5s ease forwards !important; }
  @keyframes curtainRise { from { background: rgba(0,0,0,0.75); } to { background: rgba(0,0,0,0); } }
  .theatre-overlay.closing .theatre-cover { animation: coverCollapse 0.4s cubic-bezier(0.36,0,0.66,0) forwards !important; }
  @keyframes coverCollapse { from { opacity:1; transform: scaleY(1) scaleX(1); } to { opacity:0; transform: scaleY(0) scaleX(0.6); } }
  .theatre-overlay.closing .theatre-left { animation: petalLeftClose 0.35s cubic-bezier(0.36,0,0.66,0) forwards !important; }
  @keyframes petalLeftClose { from { opacity:1; transform: scaleX(1) translateX(0); } to { opacity:0; transform: scaleX(0) translateX(160px); } }
  .theatre-overlay.closing .theatre-right { animation: petalRightClose 0.35s cubic-bezier(0.36,0,0.66,0) forwards !important; }
  @keyframes petalRightClose { from { opacity:1; transform: scaleX(1) translateX(0); } to { opacity:0; transform: scaleX(0) translateX(-160px); } }
  .theatre-overlay.closing .theatre-marquee { animation: titleSink 0.3s ease forwards !important; }
  @keyframes titleSink { from { opacity:1; transform: translateY(0) scaleY(1); } to { opacity:0; transform: translateY(-30px) scaleY(0.5); } }
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--phos);
    line-height: 1.1;
    text-shadow: var(--phos-glow);
  }
  .marquee-rule {
    width: 80px; height: 1px;
    background: var(--phos);
    margin: 0.55rem auto 0;
    box-shadow: var(--phos-glow);
    transform: scaleX(0);
    transform-origin: center;
  }
  .theatre-marquee.animate .marquee-rule { animation: ruleExpand 0.4s ease 0.92s forwards; }
  @keyframes ruleExpand { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* ── CLOSE BUTTON ── */
  .theatre-close {
    position: fixed;
    top: 1.2rem; right: 1.5rem;
    background: var(--phos-bg);
    border: 1px solid var(--phos-border);
    color: var(--phos);
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    z-index: 1010;
    opacity: 0;
    box-shadow: var(--phos-glow);
    transition: color 0.2s, box-shadow 0.2s;
  }
  .theatre-overlay.open .theatre-close { animation: fadeIn 0.4s ease 2.8s forwards; }
  .theatre-close:hover { color: #fff; box-shadow: 0 0 16px rgba(57,255,106,0.6); }

  /* ── MAIN CONTENT ── */
  .theatre-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-top: 5.5rem;
    position: relative;
    max-width: 1200px;
    width: 100%;
  }

  /* ── COVER ── */
  .theatre-cover {
    flex-shrink: 0;
    width: 320px;
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: scaleY(0);
    transform-origin: center center;
  }
  .theatre-cover.animate {
    animation: coverExpand 1.2s cubic-bezier(0.34, 1.1, 0.64, 1) 0.1s forwards;
  }
  @keyframes coverExpand {
    0%   { opacity: 1; transform: scaleY(0) scaleX(0.6); }
    100% { opacity: 1; transform: scaleY(1) scaleX(1); }
  }
  .theatre-cover img {
    width: 100%; display: block;
    border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow), 0 12px 50px rgba(0,0,0,0.9);
  }
  .theatre-cover-placeholder {
    width: 100%; aspect-ratio: 2/3;
    background: #050f08;
    border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow);
    display: flex; align-items: center; justify-content: center;
    color: var(--phos);
    font-size: 0.85rem; letter-spacing: 0.16em; text-transform: uppercase; text-align: center;
    font-family: 'Courier New', monospace;
  }

  /* ── COVER ACTION BUTTON ── */
  .theatre-cover-action { margin-top: 0.8rem; opacity: 0; }
  .theatre-cover-action.animate { animation: fadeIn 0.6s ease 2.4s forwards; }
  .theatre-cover-btn {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; font-family: var(--font);
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 0.6rem 0.7rem; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; width: 100%;
  }
  .cover-status-label {
    display: block;
    font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: inherit; font-family: 'Courier New', monospace;
    margin-bottom: 0.25rem; opacity: 0.7;
  }
  .cover-btn-published { background: var(--phos); color: #000; box-shadow: var(--phos-glow); }
  .cover-btn-published:hover { background: #5fff8a; box-shadow: 0 0 16px rgba(57,255,106,0.6); }
  .cover-btn-free { background: rgba(57,255,106,0.15); color: var(--phos); border: 1px solid var(--phos-border); box-shadow: var(--phos-glow); }
  .cover-btn-free:hover { background: rgba(57,255,106,0.25); }
  .cover-btn-inactive { background: rgba(57,255,106,0.1); border: 1px solid var(--phos-border); color: var(--phos); cursor: default; opacity: 1; box-shadow: var(--phos-glow); }

  /* ── LEFT PANEL ── */
  .theatre-left {
    width: 360px; flex-shrink: 0;
    background: var(--phos-bg);
    border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow);
    padding: 2.4rem 2rem;
    margin-right: 2.5rem;
    position: relative; opacity: 0;
    transform: scaleX(0) translateX(160px);
    transform-origin: right center;
    align-self: stretch;
    display: flex; flex-direction: column; justify-content: center;
    min-height: 460px;
    cursor: pointer;
  }
  .theatre-left.animate { animation: petalLeft 0.9s cubic-bezier(0.34, 1.1, 0.64, 1) 1.4s forwards; }
  @keyframes petalLeft {
    0%   { opacity: 0; transform: scaleX(0) translateX(160px); }
    40%  { opacity: 1; }
    100% { opacity: 1; transform: scaleX(1) translateX(0); }
  }
  .left-genre {
    font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--phos); margin-bottom: 1.3rem; font-family: 'Courier New', monospace;
  }
  .left-desc {
    font-size: 0.95rem; line-height: 1.9; color: #e0e0e0; font-weight: 300;
    overflow-y: auto; max-height: 320px;
  }
  .left-desc::-webkit-scrollbar { width: 2px; }
  .left-desc::-webkit-scrollbar-track { background: transparent; }
  .left-desc::-webkit-scrollbar-thumb { background: var(--phos-dim); }
  .left-free-text {
    margin-top: 1.4rem; padding-top: 1.1rem;
    border-top: 1px solid var(--phos-border);
    font-size: 0.85rem; line-height: 1.9; color: #bbb; font-weight: 300;
    white-space: pre-wrap; max-height: 300px; overflow-y: auto;
    font-family: 'Courier New', monospace;
  }
  .left-free-text::-webkit-scrollbar { width: 2px; }
  .left-free-text::-webkit-scrollbar-track { background: transparent; }
  .left-free-text::-webkit-scrollbar-thumb { background: var(--phos-dim); }

  /* ── RIGHT PANEL ── */
  .theatre-right {
    display: flex; flex-direction: column; gap: 2.8rem;
    margin-left: 2.5rem;
    position: relative; opacity: 0;
    transform: scaleX(0) translateX(-160px);
    transform-origin: left center;
    align-self: center; min-width: 240px;
  }
  .theatre-right.animate { animation: petalRight 0.9s cubic-bezier(0.34, 1.1, 0.64, 1) 1.6s forwards; }
  @keyframes petalRight {
    0%   { opacity: 0; transform: scaleX(0) translateX(-160px); }
    40%  { opacity: 1; }
    100% { opacity: 1; transform: scaleX(1) translateX(0); }
  }

  .right-author-box {
    background: var(--phos-bg); border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow); padding: 1.1rem 1.4rem;
  }
  .right-author-label {
    font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--phos); margin-bottom: 0.4rem; font-family: 'Courier New', monospace;
  }
  .right-author-name { font-size: 1.05rem; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
  .right-collective { font-size: 1.05rem; font-weight: 600; color: var(--text); letter-spacing: 0.02em; margin-bottom: 0.15rem; }

  .right-tags-box {
    background: var(--phos-bg); border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow); padding: 1.1rem 1.4rem;
  }
  .right-tags-label {
    font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--phos); margin-bottom: 0.6rem; font-family: 'Courier New', monospace;
  }
  .right-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .right-tag { font-size: 0.9rem; letter-spacing: 0.06em; color: #bbb; cursor: pointer; transition: color 0.15s, text-shadow 0.15s; }
  .right-tag:hover { color: var(--phos); text-shadow: 0 0 8px rgba(57,255,106,0.5); }

  /* ── EXPAND BUTTONS ── */
  .expand-btn {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    font-size: 1rem;
    color: var(--phos-dim);
    cursor: pointer;
    z-index: 20;
    line-height: 1;
    transition: color 0.2s, transform 0.2s;
    user-select: none;
  }
  .expand-btn:hover { color: var(--phos); }
  .expand-btn.expanded { color: var(--phos); transform: rotate(45deg); }

  /* ── EXPANDED COVER ── */
  .theatre-cover.expanded {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: min(80vw, 500px) !important;
    z-index: 1100 !important;
    animation: expandIn 0.3s cubic-bezier(0.34,1.2,0.64,1) forwards;
  }
  @keyframes expandIn {
    from { opacity: 0.6; transform: translate(-50%,-50%) scale(0.85); }
    to   { opacity: 1;   transform: translate(-50%,-50%) scale(1); }
  }
  .theatre-cover.expanded img {
    box-shadow: 0 0 60px rgba(57,255,106,0.3), 0 20px 80px rgba(0,0,0,0.95);
  }

  /* ── EXPANDED DESC ── */
  .theatre-left.expanded {
    position: fixed !important;
    top: 10vh !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: min(85vw, 600px) !important;
    height: 80vh !important;
    min-height: unset !important;
    z-index: 1100 !important;
    overflow-y: scroll !important;
    -webkit-overflow-scrolling: touch !important;
    background: rgba(0, 30, 12, 0.98) !important;
    display: block !important;
    cursor: default !important;
    opacity: 1 !important;
    animation: none !important;
  }
  .theatre-left.expanded .left-desc {
    max-height: none !important;
  }
  .theatre-left.expanded .left-free-text {
    max-height: none !important;
  }

  /* Dim overlay behind expanded element */
  .expand-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1090;
    cursor: pointer;
  }
  .expand-overlay.show { display: block; }

  /* ── EXPAND MODAL ── */
  #expandModal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1090;
    background: rgba(0,0,0,0.7);
    cursor: pointer;
  }
  #expandModal.open { display: block; }
  #expandModalInner {
    position: absolute;
    top: 10vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(85vw, 600px);
    height: 80vh;
    background: rgba(0, 30, 12, 0.98);
    border: 1px solid var(--phos-border);
    box-shadow: var(--phos-glow);
    overflow-y: auto;
    padding: 2.4rem 2rem;
    cursor: default;
  }
  #expandModalClose {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    background: transparent;
    border: none;
    color: var(--phos-dim);
    font-size: 1rem;
    cursor: pointer;
    z-index: 10;
  }
  #expandModalClose:hover { color: var(--phos); }
  #expandModalContent {
    font-size: 0.95rem;
    line-height: 1.9;
    color: #e0e0e0;
    font-weight: 300;
  }

  #leftDesc p, #expandModalContent p {
    margin: 0 0 1.15em 0;
  }
  #leftDesc p:last-child, #expandModalContent p:last-child {
    margin-bottom: 0;
  }
  #leftDesc strong, #expandModalContent strong { font-weight: 700; }
  #leftDesc em, #expandModalContent em { font-style: italic; }
  #leftDesc u, #expandModalContent u { text-decoration: underline; }

  /* ── ATTRIBUTION ── */
  .theatre-attribution {
    position: absolute; bottom: 0.8rem; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0; font-family: 'Courier New', monospace; line-height: 1.8;
  }
  .theatre-overlay.open .theatre-attribution { animation: fadeIn 0.4s ease 1.2s forwards; }
  .attr-line1 { display: block; font-size: 0.72rem; letter-spacing: 0.18em; color: var(--phos-dim); white-space: nowrap; }
  .attr-line2 { display: block; font-size: 0.72rem; letter-spacing: 0.38em; color: var(--phos-dim); white-space: nowrap; text-transform: uppercase; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── RESPONSIVE ── */
  @media (max-width: 760px) {
    .theatre-content { flex-direction: column; align-items: center; margin-top: 4rem; gap: 1rem; }
    .theatre-left { width: 100%; max-width: 360px; transform: translateX(0); }
    .theatre-left.animate { animation: fadeInUp 0.5s ease 0.32s forwards; }
    .theatre-right { margin-left: 0; width: 100%; max-width: 360px; transform: translateX(0); }
    .theatre-right.animate { animation: fadeInUp 0.5s ease 0.46s forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  }

  .no-results { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; }
  footer { border-top: 1px solid var(--border); padding: 1rem 0; text-align: center; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  footer span { color: var(--olive); }
</style>

</div>

</div>

const STATUS_CONFIG = {
  'published':     { label: 'Buy on Amazon →', btnClass: 'btn-published',     badge: 'Published',      badgeClass: 'badge-published'     },
  'coming-soon':   { label: 'Coming Soon',     btnClass: 'btn-coming-soon',   badge: 'Coming Soon',    badgeClass: 'badge-coming-soon'   },
  'free':          { label: 'Read Free',       btnClass: 'btn-free',          badge: 'Free',           badgeClass: 'badge-free'          },
  'fighting-back': { label: 'Fighting Back',   btnClass: 'btn-fighting-back', badge: 'Fighting Back',  badgeClass: 'badge-fighting-back' },
  'genesis':       { label: 'Genesis',         btnClass: 'btn-genesis',       badge: 'Genesis',        badgeClass: 'badge-genesis'       },
  'dark-thought':  { label: 'A Dark Thought',  btnClass: 'btn-dark-thought',  badge: 'A Dark Thought', badgeClass: 'badge-dark-thought'  },
};

const COVER_BTN_CLASS = {
  'published':     'cover-btn-published',
  'free':          'cover-btn-free',
  'coming-soon':   'cover-btn-inactive',
  'fighting-back': 'cover-btn-inactive',
  'genesis':       'cover-btn-inactive',
  'dark-thought':  'cover-btn-inactive',
};

let activeTag = '', searchQuery = '', sortOrder = 'newest';

document.getElementById('searchInput').addEventListener('input', e => {
  const val = e.target.value.toLowerCase().trim();
  if (val.startsWith('#')) { activeTag = val.slice(1); searchQuery = ''; }
  else { searchQuery = val; activeTag = ''; }
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortOrder = e.target.value; render();
});

const STATUS_ORDER = {'published':0,'coming-soon':1,'fighting-back':2,'genesis':3,'dark-thought':4,'free':5};

function getFiltered() {
  let list = [...BOOKS];
  if (activeTag)   list = list.filter(b => (b.tags||[]).includes(activeTag));
  if (searchQuery) list = list.filter(b => b.title.toLowerCase().includes(searchQuery) || (b.tags||[]).some(t => t.includes(searchQuery)));
  list.sort((a,b) => {
    if (sortOrder==='newest') {
      const so = (STATUS_ORDER[a.status]??99) - (STATUS_ORDER[b.status]??99);
      return so !== 0 ? so : b.year - a.year;
    }
    if (sortOrder==='oldest') return a.year-b.year;
    if (sortOrder==='az')     return a.title.localeCompare(b.title);
    if (sortOrder==='za')     return b.title.localeCompare(a.title);
    return 0;
  });
  return list;
}

function openModal(idx) {
  const b   = BOOKS[idx];
  const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];

  ['theatreMarquee','theatreLeft','theatreCover','theatreRight','coverAction'].forEach(id => {
    document.getElementById(id).classList.remove('animate');
  });

  document.getElementById('marqueeTitle').textContent = b.title;
  document.getElementById('leftGenre').textContent = b.genre + ' · ' + b.year;
  // content field: rich HTML stored from editor and rendered directly
  const rawContent = b.content || b.desc || b.fullText || '';
  document.getElementById('leftDesc').innerHTML = rawContent;
  document.getElementById('leftFreeText').style.display = 'none';

  const coverInner = document.getElementById('coverInner');
  if (b.cover) {
    coverInner.innerHTML = `<img src="${b.cover}" alt="${b.title}" onerror="this.parentElement.innerHTML='<div class=theatre-cover-placeholder>Cover<br>Coming Soon</div>'">`;
  } else {
    coverInner.innerHTML = `<div class="theatre-cover-placeholder">Cover<br>Coming Soon</div>`;
  }

  const btnCls = COVER_BTN_CLASS[b.status] || 'cover-btn-inactive';
  if (b.status === 'published' && b.link) {
    document.getElementById('coverAction').innerHTML =
      `<a id="coverBtn" class="theatre-cover-btn ${btnCls}" href="${b.link}" target="_blank" rel="noopener"><span class="cover-status-label">Status</span>${cfg.label}</a>`;
  } else {
    document.getElementById('coverAction').innerHTML =
      `<span id="coverBtn" class="theatre-cover-btn ${btnCls}"><span class="cover-status-label">Status</span>${cfg.label}</span>`;
  }

  const collectiveEl = document.getElementById('rightCollective');
  if (b.author === 'The Pitch Dark Press Collective') {
    document.getElementById('rightAuthorName').textContent = 'Lead author Kevin Martin';
    collectiveEl.style.display = 'block';
  } else {
    document.getElementById('rightAuthorName').textContent = 'Kevin Martin';
    collectiveEl.style.display = 'none';
  }

  const tagsHtml = (b.tags||[]).map(t =>
    `<span class="right-tag" onclick="filterByTag('${t}');closeModal()">#${t}</span>`
  ).join(' ');
  document.getElementById('rightTags').innerHTML = tagsHtml;

  document.getElementById('theatreAttribution').innerHTML =
    `<span class="attr-line1">Pitch Dark Press &copy; 2026</span><span class="attr-line2">Publish and be damned</span>`;

  const overlay = document.getElementById('theatreOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  requestAnimationFrame(() => {
    document.getElementById('theatreCover').classList.add('animate');
    document.getElementById('theatreLeft').classList.add('animate');
    document.getElementById('theatreRight').classList.add('animate');
    document.getElementById('coverAction').classList.add('animate');
    document.getElementById('theatreMarquee').classList.add('animate');
  });
}

function collapseAll() {
  const descEl = document.getElementById('theatreLeft');
  descEl.style.cssText = '';
  descEl.classList.remove('expanded');
  document.getElementById('theatreCover').classList.remove('expanded');
  document.getElementById('coverExpandBtn').classList.remove('expanded');
  document.getElementById('descExpandBtn').classList.remove('expanded');
  document.getElementById('coverExpandBtn').textContent = '⤢';
  document.getElementById('descExpandBtn').textContent = '⤢';
  document.getElementById('expandOverlay').classList.remove('show');
  document.getElementById('expandModal').classList.remove('open');
}

function toggleExpand(which) {
  const coverEl  = document.getElementById('theatreCover');
  const descEl   = document.getElementById('theatreLeft');
  const coverBtn = document.getElementById('coverExpandBtn');
  const descBtn  = document.getElementById('descExpandBtn');

  const coverOpen = coverEl.classList.contains('expanded');
  const descOpen  = document.getElementById('expandModal').classList.contains('open');

  collapseAll();

  if (which === 'cover' && !coverOpen) {
    coverEl.classList.add('expanded');
    coverBtn.classList.add('expanded');
    coverBtn.textContent = '✕';
    document.getElementById('expandOverlay').classList.add('show');
  } else if (which === 'desc' && !descOpen) {
    // Use the separate modal for desc so scroll works
    const content = document.getElementById('leftDesc').innerHTML;
    document.getElementById('expandModalContent').innerHTML = content;
    document.getElementById('expandModal').classList.add('open');
    descBtn.classList.add('expanded');
    descBtn.textContent = '✕';
  }
}

function closeModal() {
  collapseAll();
  const overlay = document.getElementById('theatreOverlay');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('open');
    overlay.classList.remove('closing');
    document.body.style.overflow = '';
  }, 500);
}

document.getElementById('theatreClose').addEventListener('click', closeModal);
document.getElementById('theatreOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('theatreOverlay') ||
      e.target === document.getElementById('theatreStage')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

function filterByTag(tag) { activeTag = activeTag===tag ? '' : tag; render(); }

function render() {
  const catalog = document.getElementById('catalog');
  const books   = getFiltered();
  document.getElementById('countLine').innerHTML = `Showing <strong>${books.length}</strong> of <strong>${BOOKS.length}</strong> titles`;
  if (!books.length) { catalog.innerHTML = '<div class="no-results">No titles found</div>'; return; }
  catalog.innerHTML = books.map((b,i) => {
    const cfg = STATUS_CONFIG[b.status] || STATUS_CONFIG['published'];
    const idx = BOOKS.indexOf(b);
    const tagsHtml = (b.tags||[]).map(t => `<span class="book-tag" onclick="event.stopPropagation();filterByTag('${t}')">#${t}</span>`).join('');
    const collectiveHtml = b.author ? `<div class="collective-tag">${b.author}</div>` : '';
    return `<div class="book-card" style="animation-delay:${i*0.035}s" onclick="openModal(${idx})">
      <div class="cover-wrap">
        <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.style.opacity='0'">
        <span class="status-badge ${cfg.badgeClass}">${cfg.badge}</span>
      </div>
      <div class="genre-tag">${b.genre} · ${b.year}</div>
      ${collectiveHtml}
      <div class="book-title">${b.title}</div>
      <div class="book-tags">${tagsHtml}</div>
      <span class="action-btn ${cfg.btnClass}">${cfg.label}</span>
    </div>`;
  }).join('');
}

render();
</script>
